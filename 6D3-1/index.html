<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 圓形圖生成器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #fff;
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
        }
        .panel {
            flex: 1 1 350px;
            padding: 30px;
            background: #fafafa;
            border-right: 1px solid #eaeaea;
        }
        .chart-panel {
            flex: 1 1 450px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            background: #fff;
        }
        .chart-panel:fullscreen {
            justify-content: center;
            padding: 5vmin;
        }
        .chart-panel:fullscreen .svg-container {
            max-width: 70vmin;
        }
        .chart-panel:fullscreen #displayTitle {
            font-size: 4vmin;
            margin-bottom: 3vmin;
        }
        .btn-fullscreen {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e0e0e0;
            color: #333;
            padding: 8px 12px;
        }
        .btn-fullscreen:hover { background: #ccc; }
        
        h2, h3 { margin-top: 0; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px;}
        input[type="text"], input[type="number"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
        }
        .checkbox-group {
            display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
        }
        .checkbox-label {
            display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;
        }
        .item-row {
            display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
        }
        .item-row input[type="text"] { flex: 2; margin: 0; }
        .item-row input[type="number"] { flex: 1; margin: 0; }
        .item-row input[type="color"] {
            width: 36px; height: 36px; padding: 0; border: none; cursor: pointer; border-radius: 4px;
        }
        button {
            padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: background 0.2s;
        }
        .btn-add { background: #4caf50; color: white; width: 100%; margin-top: 5px; }
        .btn-add:hover { background: #45a049; }
        .btn-delete { background: #f44336; color: white; padding: 10px; }
        .btn-delete:hover { background: #e53935; }
        #displayTitle { margin-bottom: 20px; color: #333; text-align: center; }
        .svg-container { position: relative; width: 100%; max-width: 450px; transition: max-width 0.3s; }
        svg { width: 100%; height: auto; }
        .slice {
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            transform-origin: center;
        }
        .slice:hover { opacity: 0.85; transform: scale(1.03); }
        text {
            font-size: 13px; font-weight: bold; fill: #111;
            text-anchor: middle; dominant-baseline: middle; pointer-events: none;
        }
        .text-outline {
            stroke: #ffffff; stroke-width: 3.5px; stroke-linejoin: round; paint-order: stroke fill;
        }
        .hint { font-size: 12px; color: #777; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>📊 圓形圖生成器</h2>
        
        <div class="form-group">
            <label for="chartTitle">圖表標題</label>
            <input type="text" id="chartTitle" value="六年級學生最喜愛的運動" oninput="drawChart()">
        </div>

        <h3>顯示選項 (可複選)</h3>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="cbLabel" checked disabled> 項目</label>
            <label class="checkbox-label"><input type="checkbox" id="cbData" checked onchange="drawChart()"> 數據</label>
            <label class="checkbox-label"><input type="checkbox" id="cbPercent" checked onchange="drawChart()"> 百分比</label>
            <label class="checkbox-label"><input type="checkbox" id="cbAngle" onchange="drawChart()"> 圓心角</label>
        </div>

        <h3>輸入數據</h3>
        <div id="dataItems"></div>
        <button class="btn-add" onclick="addItem()">＋ 新增項目</button>
    </div>

    <div class="chart-panel" id="chartPanel">
        <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶ 全螢幕</button>
        <h2 id="displayTitle"></h2>
        <div class="svg-container">
            <svg id="pieChart" viewBox="0 0 500 500"></svg>
            <input type="color" id="hiddenColorPicker" style="opacity:0; position:absolute; pointer-events:none;">
        </div>
        <p class="hint">💡 提示：直接點擊圓形圖上的區塊，即可更換該區塊的顏色。</p>
    </div>
</div>

<script>
    const colorPalette = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#EA6B66', '#88D27A', '#F3A638', '#5470C6'];
    
    let items = [
        { id: 1, label: '籃球', value: 50, color: '#FF6384' },
        { id: 2, label: '羽毛球', value: 40, color: '#36A2EB' },
        { id: 3, label: '跑步', value: 20, color: '#FFCE56' },
        { id: 4, label: '游泳', value: 10, color: '#4BC0C0' }
    ];

    const dataItemsContainer = document.getElementById('dataItems');
    const pieChart = document.getElementById('pieChart');
    const displayTitle = document.getElementById('displayTitle');
    const chartTitleInput = document.getElementById('chartTitle');
    const hiddenColorPicker = document.getElementById('hiddenColorPicker');
    const chartPanel = document.getElementById('chartPanel');

    const cbLabel = document.getElementById('cbLabel');
    const cbData = document.getElementById('cbData');
    const cbPercent = document.getElementById('cbPercent');
    const cbAngle = document.getElementById('cbAngle');

    let activeColorItemId = null;

    hiddenColorPicker.addEventListener('input', function() {
        if (activeColorItemId !== null) {
            updateItem(activeColorItemId, 'color', this.value);
        }
    });

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            chartPanel.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable fullscreen mode: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function generateId() { return Math.floor(Math.random() * 1000000); }

    function renderInputs() {
        dataItemsContainer.innerHTML = '';
        items.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <input type="color" value="${item.color}" onchange="updateItem(${item.id}, 'color', this.value)" title="選擇顏色">
                <input type="text" value="${item.label}" oninput="updateItem(${item.id}, 'label', this.value)" placeholder="項目名稱">
                <input type="number" value="${item.value}" oninput="updateItem(${item.id}, 'value', this.value)" min="0" placeholder="數量">
                <button class="btn-delete" onclick="removeItem(${item.id})" title="刪除">✖</button>
            `;
            dataItemsContainer.appendChild(row);
        });
        drawChart();
    }

    function updateItem(id, field, value) {
        const item = items.find(i => i.id === id);
        if (item) {
            item[field] = field === 'value' ? Number(value) : value;
            drawChart();
            if (field === 'color') renderInputs(); 
        }
    }

    function addItem() {
        const nextColor = colorPalette[items.length % colorPalette.length];
        items.push({ id: generateId(), label: `新項目`, value: 10, color: nextColor });
        renderInputs();
    }

    function removeItem(id) {
        items = items.filter(i => i.id !== id);
        renderInputs();
    }

    function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
        const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
        return {
            x: centerX + (radius * Math.cos(angleInRadians)),
            y: centerY + (radius * Math.sin(angleInRadians))
        };
    }

    function createSlicePath(cx, cy, r, startAngle, endAngle) {
        if (endAngle - startAngle >= 359.9) {
            return `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r} Z`;
        }
        const start = polarToCartesian(cx, cy, r, startAngle);
        const end = polarToCartesian(cx, cy, r, endAngle);
        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
        return [
            "M", cx, cy, 
            "L", start.x, start.y, 
            "A", r, r, 0, largeArcFlag, 1, end.x, end.y, 
            "Z"
        ].join(" ");
    }

    function drawChart() {
        displayTitle.textContent = chartTitleInput.value;
        pieChart.innerHTML = '';

        const total = items.reduce((sum, item) => sum + (item.value || 0), 0);
        if (total === 0) return;

        let currentAngle = 0;
        const cx = 250;
        const cy = 250;
        const r = 200;

        items.forEach(item => {
            if (!item.value || item.value <= 0) return;

            const percent = item.value / total;
            const angle = percent * 360;
            const endAngle = currentAngle + angle;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", createSlicePath(cx, cy, r, currentAngle, endAngle));
            path.setAttribute("fill", item.color);
            path.setAttribute("class", "slice");
            path.setAttribute("stroke", "#ffffff");
            path.setAttribute("stroke-width", "3");
            
            path.addEventListener("click", () => {
                activeColorItemId = item.id;
                hiddenColorPicker.value = item.color;
                hiddenColorPicker.click();
            });

            pieChart.appendChild(path);

            const midAngle = currentAngle + (angle / 2);
            const textPos = polarToCartesian(cx, cy, r * 0.65, midAngle); 

            let lines = [];
            if (cbLabel.checked && item.label) lines.push(item.label);
            if (cbData.checked) lines.push(item.value);
            if (cbPercent.checked) lines.push((percent * 100).toFixed(1) + '%');
            if (cbAngle.checked) lines.push(angle.toFixed(1) + '°');

            if (lines.length > 0) {
                const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textNode.setAttribute("x", textPos.x);
                textNode.setAttribute("y", textPos.y);
                textNode.setAttribute("class", "text-outline");

                const lineHeight = 16;
                const startY = textPos.y - ((lines.length - 1) * lineHeight) / 2;

                lines.forEach((lineText, index) => {
                    const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspan.setAttribute("x", textPos.x);
                    tspan.setAttribute("y", startY + (index * lineHeight));
                    tspan.textContent = lineText;
                    textNode.appendChild(tspan);
                });

                pieChart.appendChild(textNode);
            }

            currentAngle = endAngle;
        });
    }

    renderInputs();
</script>
</body>
</html>
