<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 圓形圖生成器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@700;900&display=swap');

        body {
            font-family: 'Nunito', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #444;
            margin: 0;
            padding: 2vh 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 1100px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15), 0 0 0 8px rgba(255,255,255,0.5);
            display: flex;
            flex-wrap: wrap;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .panel {
            flex: 1 1 380px;
            padding: 35px;
            background: #fafcff;
            border-right: 2px dashed #dbe4f0;
        }
        .chart-panel {
            flex: 1 1 500px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #fff;
        }
        .chart-panel:fullscreen {
            justify-content: center;
            padding: 5vmin;
            background: radial-gradient(circle, #fff 0%, #f0f4f8 100%);
        }
        .chart-panel:fullscreen .svg-container {
            max-width: 75vmin;
        }
        .chart-panel:fullscreen #displayTitle {
            font-size: 5vmin;
            margin-bottom: 4vmin;
            text-shadow: 2px 4px 6px rgba(0,0,0,0.1);
        }
        .btn-fullscreen {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffd166;
            color: #d35400;
            padding: 10px 18px;
            font-size: 16px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(255, 209, 102, 0.4);
        }
        .btn-fullscreen:hover { 
            background: #ffc233; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 209, 102, 0.5);
        }
        
        h2 { 
            margin-top: 0; 
            color: #2b2d42; 
            font-size: 28px;
            letter-spacing: 1px;
            text-align: center;
        }
        h3 {
            color: #8d99ae;
            font-size: 18px;
            border-bottom: 2px solid #edf2f4;
            padding-bottom: 8px;
            margin-top: 25px;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 900; margin-bottom: 10px; font-size: 16px; color: #2b2d42;}
        input[type="text"], input[type="number"] {
            width: 100%; padding: 14px; 
            border: 2px solid #e0e7ee; 
            border-radius: 12px; 
            font-size: 16px;
            font-family: inherit;
            font-weight: bold;
            color: #333;
            background: #f8fbff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.2);
        }
        
        .checkbox-group {
            display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
            background: #fff; padding: 15px; border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid #edf2f4;
        }
        .checkbox-label {
            display: flex; align-items: center; gap: 8px; cursor: pointer; 
            font-size: 16px; font-weight: bold; color: #555;
        }
        input[type="checkbox"] {
            width: 20px; height: 20px; accent-color: #ef476f; cursor: pointer;
        }
        
        .item-row {
            display: flex; gap: 10px; margin-bottom: 15px; align-items: center;
            background: #fff; padding: 10px; border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #f0f4f8;
            transition: transform 0.2s;
        }
        .item-row:hover { transform: scale(1.02); }
        .item-row input[type="text"] { flex: 2; margin: 0; padding: 10px; }
        .item-row input[type="number"] { flex: 1.2; margin: 0; padding: 10px; text-align: center; }
        .item-row input[type="color"] {
            width: 44px; height: 44px; padding: 0; border: none; cursor: pointer; 
            border-radius: 50%; overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .item-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .item-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
        
        button {
            padding: 14px 20px; border: none; border-radius: 12px; cursor: pointer;
            font-weight: 900; font-size: 16px; letter-spacing: 1px;
            transition: all 0.2s ease; font-family: inherit;
        }
        .btn-add { 
            background: linear-gradient(135deg, #06d6a0 0%, #00b4d8 100%); 
            color: white; width: 100%; margin-top: 10px;
            box-shadow: 0 6px 15px rgba(6, 214, 160, 0.3);
        }
        .btn-add:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(6, 214, 160, 0.4); 
        }
        .btn-add:active { transform: translateY(1px); }
        
        .btn-delete { 
            background: #ef476f; color: white; padding: 12px 15px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(239, 71, 111, 0.3);
        }
        .btn-delete:hover { background: #d90429; transform: scale(1.1); }
        
        #displayTitle { 
            margin-bottom: 25px; color: #118ab2; text-align: center; 
            font-size: 32px; font-weight: 900;
            text-shadow: 2px 2px 0px #e0fbfc;
        }
        
        .svg-container { position: relative; width: 100%; max-width: 500px; transition: max-width 0.3s; }
        svg { width: 100%; height: auto; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1)); }
        
        .slice {
            cursor: pointer;
            transition: opacity 0.2s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
        }
        .slice:hover { opacity: 0.9; transform: scale(1.05); }
        
        text {
            font-size: 22px; /* 放大字體 */
            font-weight: 900; 
            fill: #2b2d42;
            text-anchor: middle; 
            dominant-baseline: middle; 
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        .text-outline {
            stroke: #ffffff; 
            stroke-width: 5px; /* 加粗白邊 */
            stroke-linejoin: round; 
            paint-order: stroke fill;
        }
        .hint { 
            font-size: 15px; color: #8d99ae; margin-top: 25px; text-align: center; 
            font-weight: bold; background: #f8fbff; padding: 10px 20px; border-radius: 50px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>📊 圓形圖生成器</h2>
        
        <div class="form-group">
            <label for="chartTitle">✨ 標題</label>
            <input type="text" id="chartTitle" value="🏆 六年級學生最喜愛的運動" oninput="drawChart()">
        </div>

        <h3>👀 顯示選項 (自由搭配)</h3>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="cbLabel" checked disabled> 項目名稱</label>
            <label class="checkbox-label"><input type="checkbox" id="cbData" checked onchange="drawChart()"> 數量</label>
            <label class="checkbox-label"><input type="checkbox" id="cbPercent" checked onchange="drawChart()"> 百分比 %</label>
            <label class="checkbox-label"><input type="checkbox" id="cbAngle" onchange="drawChart()"> 圓心角 °</label>
        </div>

        <h3>📝 輸入各項目的數據</h3>
        <div id="dataItems"></div>
        <button class="btn-add" onclick="addItem()">➕ 新增項目</button>
    </div>

    <div class="chart-panel" id="chartPanel">
        <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶ 全螢幕展示</button>
        <h2 id="displayTitle"></h2>
        <div class="svg-container">
            <svg id="pieChart" viewBox="0 0 500 500"></svg>
            <input type="color" id="hiddenColorPicker" style="opacity:0; position:absolute; pointer-events:none;">
        </div>
        <p class="hint">💡 提示：直接點擊圖形上的色塊，就可以馬上換顏色！</p>
    </div>
</div>

<script>
    // 鮮豔可愛的色彩調色盤
    const colorPalette = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#f15bb5', '#00bbf9', '#00f5d4', '#f8961e', '#9d4edd'];
    
    let items = [
        { id: 1, label: '🏀 籃球', value: 48, color: '#ff595e' },
        { id: 2, label: '🏸 羽毛球', value: 35, color: '#1982c4' },
        { id: 3, label: '🏃‍♂️ 跑步', value: 22, color: '#ffca3a' },
        { id: 4, label: '🏊‍♂️ 游泳', value: 15, color: '#00bbf9' }
    ];

    const dataItemsContainer = document.getElementById('dataItems');
    const pieChart = document.getElementById('pieChart');
    const displayTitle = document.getElementById('displayTitle');
    const chartTitleInput = document.getElementById('chartTitle');
    const hiddenColorPicker = document.getElementById('hiddenColorPicker');
    const chartPanel = document.getElementById('chartPanel');

    const cbLabel = document.getElementById('cbLabel');
    const cbData = document.getElementById('cbData');
    const cbPercent = document.getElementById('cbPercent');
    const cbAngle = document.getElementById('cbAngle');

    let activeColorItemId = null;

    hiddenColorPicker.addEventListener('input', function() {
        if (activeColorItemId !== null) {
            updateItem(activeColorItemId, 'color', this.value);
        }
    });

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            chartPanel.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable fullscreen mode: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function generateId() { return Math.floor(Math.random() * 1000000); }

    function renderInputs() {
        dataItemsContainer.innerHTML = '';
        items.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <input type="color" value="${item.color}" onchange="updateItem(${item.id}, 'color', this.value)" title="點擊換顏色">
                <input type="text" value="${item.label}" oninput="updateItem(${item.id}, 'label', this.value)" placeholder="項目名稱 (例如: 躲避球)">
                <input type="number" value="${item.value}" oninput="updateItem(${item.id}, 'value', this.value)" min="0" placeholder="多少人?">
                <button class="btn-delete" onclick="removeItem(${item.id})" title="刪除這個項目">✖</button>
            `;
            dataItemsContainer.appendChild(row);
        });
        drawChart();
    }

    function updateItem(id, field, value) {
        const item = items.find(i => i.id === id);
        if (item) {
            item[field] = field === 'value' ? Number(value) : value;
            drawChart();
            if (field === 'color') renderInputs(); 
        }
    }

    function addItem() {
        const nextColor = colorPalette[items.length % colorPalette.length];
        items.push({ id: generateId(), label: `⚽ 新運動`, value: 10, color: nextColor });
        renderInputs();
    }

    function removeItem(id) {
        items = items.filter(i => i.id !== id);
        renderInputs();
    }

    function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
        const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
        return {
            x: centerX + (radius * Math.cos(angleInRadians)),
            y: centerY + (radius * Math.sin(angleInRadians))
        };
    }

    function createSlicePath(cx, cy, r, startAngle, endAngle) {
        if (endAngle - startAngle >= 359.9) {
            return `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx} ${cy + r} A ${r} ${r} 0 1 1 ${cx} ${cy - r} Z`;
        }
        const start = polarToCartesian(cx, cy, r, startAngle);
        const end = polarToCartesian(cx, cy, r, endAngle);
        const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
        return [
            "M", cx, cy, 
            "L", start.x, start.y, 
            "A", r, r, 0, largeArcFlag, 1, end.x, end.y, 
            "Z"
        ].join(" ");
    }

    function drawChart() {
        displayTitle.textContent = chartTitleInput.value;
        pieChart.innerHTML = '';

        const total = items.reduce((sum, item) => sum + (item.value || 0), 0);
        if (total === 0) return;

        let currentAngle = 0;
        const cx = 250;
        const cy = 250;
        const r = 210; // 稍微加大半徑讓畫面更飽滿

        items.forEach(item => {
            if (!item.value || item.value <= 0) return;

            const percent = item.value / total;
            const angle = percent * 360;
            const endAngle = currentAngle + angle;

            // 畫扇形
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", createSlicePath(cx, cy, r, currentAngle, endAngle));
            path.setAttribute("fill", item.color);
            path.setAttribute("class", "slice");
            path.setAttribute("stroke", "#ffffff");
            path.setAttribute("stroke-width", "6"); // 更粗的分割線，海報風格
            
            path.addEventListener("click", () => {
                activeColorItemId = item.id;
                hiddenColorPicker.value = item.color;
                hiddenColorPicker.click();
            });

            pieChart.appendChild(path);

            // 處理文字標籤
            const midAngle = currentAngle + (angle / 2);
            // 文字位置：放在半徑的 68% 處
            const textPos = polarToCartesian(cx, cy, r * 0.68, midAngle); 

            let lines = [];
            if (cbLabel.checked && item.label) lines.push(item.label);
            if (cbData.checked) lines.push(item.value + ' 人');
            if (cbPercent.checked) lines.push((percent * 100).toFixed(1) + '%');
            if (cbAngle.checked) lines.push(angle.toFixed(1) + '°');

            if (lines.length > 0) {
                const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textNode.setAttribute("x", textPos.x);
                textNode.setAttribute("y", textPos.y);
                textNode.setAttribute("class", "text-outline");

                const lineHeight = 26; // 加大行距配合大字體
                const startY = textPos.y - ((lines.length - 1) * lineHeight) / 2;

                lines.forEach((lineText, index) => {
                    const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspan.setAttribute("x", textPos.x);
                    tspan.setAttribute("y", startY + (index * lineHeight));
                    tspan.textContent = lineText;
                    textNode.appendChild(tspan);
                });

                pieChart.appendChild(textNode);
            }

            currentAngle = endAngle;
        });
    }

    renderInputs();
</script>
</body>
</html>
