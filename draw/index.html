<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雲端試算表抽獎機</title>
  <!-- 引入 Tailwind CSS 快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 簡單的抽獎跳動動畫 */
    @keyframes pulse-fast {
      0%, 100% { transform: scale(1); color: #fff; }
      50% { transform: scale(1.1); color: #fde047; }
    }
    .drawing-anim { animation: pulse-fast 0.1s infinite; }
    .loader { border: 3px solid #f3f4f6; border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">
    
    <!-- 上方：抽獎顯示區 與 歷史紀錄 -->
    <div class="bg-white rounded-3xl shadow-lg overflow-hidden flex flex-col md:flex-row">
      <!-- 左側抽獎畫面 -->
      <div class="md:w-1/2 p-8 bg-gradient-to-br from-indigo-500 to-purple-700 text-white flex flex-col items-center justify-center relative overflow-hidden">
        <h1 class="text-3xl font-bold mb-6 relative z-10 flex items-center gap-2">🏆 雲端概率抽獎機</h1>
        <div class="flex items-center justify-center w-48 h-48 bg-white/20 backdrop-blur-md rounded-full border-4 border-white/30 shadow-xl mb-8 relative z-10">
          <span id="displayNumber" class="text-8xl font-black transition-all duration-75">?</span>
        </div>
        <button id="drawBtn" onclick="startDraw()" class="relative z-10 px-8 py-4 bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-bold rounded-full text-xl shadow-lg transition-transform hover:scale-105 active:scale-95 w-full max-w-xs flex items-center justify-center gap-2">
          ▶ 開始抽獎
        </button>
      </div>

      <!-- 右側資訊區 -->
      <div class="md:w-1/2 p-6 bg-white flex flex-col">
        <h2 class="text-xl font-bold mb-4 text-slate-700">📜 開獎紀錄</h2>
        <div id="historyContainer" class="flex flex-wrap gap-2 mb-6 min-h-[100px] content-start">
          <span class="text-slate-400 text-sm">尚無紀錄...</span>
        </div>
        <div class="mt-auto bg-slate-50 p-4 rounded-xl border border-slate-100">
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500">當前總權重: <strong id="totalWeightStr" class="text-xl text-indigo-600">25</strong></span>
            <button onclick="resetWeights()" class="px-3 py-1.5 bg-slate-200 hover:bg-slate-300 rounded-lg text-slate-600 transition font-medium">↺ 重置概率</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 中間：Google 試算表同步區 -->
    <div class="bg-indigo-50 border border-indigo-100 rounded-3xl shadow-sm p-6 flex flex-col md:flex-row items-center gap-4">
      <div class="text-indigo-800 font-bold flex shrink-0 items-center gap-2 text-lg">
        ☁️ 試算表代碼同步
      </div>
      <div class="flex-1 flex w-full flex-col sm:flex-row gap-2">
        <input type="text" id="syncCode" placeholder="輸入 6 碼讀取" maxlength="6" class="w-full sm:w-40 px-4 py-3 border-2 border-indigo-200 rounded-xl focus:outline-none focus:border-indigo-400 font-mono text-center text-lg uppercase tracking-widest text-slate-700 placeholder:tracking-normal placeholder:text-sm bg-white">
        <button onclick="loadFromCloud()" class="flex-1 sm:flex-none px-6 py-3 bg-white text-indigo-600 border-2 border-indigo-200 hover:bg-indigo-100 font-bold rounded-xl transition flex justify-center items-center gap-2 shadow-sm">
          <div id="loadSpinner" class="loader border-indigo-200 border-t-indigo-600"></div> 
          ⬇️ 讀取代碼
        </button>
        <button onclick="saveToCloud()" class="flex-1 sm:flex-none px-6 py-3 bg-indigo-600 text-white hover:bg-indigo-700 font-bold rounded-xl transition shadow flex justify-center items-center gap-2">
          <div id="saveSpinner" class="loader border-white/30 border-t-white"></div> 
          ⬆️ 生成並儲存
        </button>
      </div>
    </div>

    <!-- 訊息提示框 -->
    <div id="messageBox" class="hidden p-4 rounded-xl text-center font-bold text-sm shadow-sm transition-all"></div>

    <!-- 底部：概率設定區塊 (25宮格) -->
    <div class="bg-white rounded-3xl shadow-lg p-6 md:p-8">
      <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">🔢 號碼概率設定 (1-25)</h2>
      <div id="gridContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <!-- JS 會動態生成 25 個格子 -->
      </div>
    </div>

  </div>

  <!-- Vanilla JS 核心邏輯 -->
  <script>
    // ==========================================
    // ✅ 專屬 Google Apps Script 網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyE4zubc9C3uZikPU-vOOpwMnlvODZFP1dsC354vAvZrekJokgvONzsssCLgGQ0BNJxqg/exec";
    // ==========================================

    let weights = Array(25).fill(1); // 1-25號預設權重為1
    let historyList =[];
    let isDrawing = false;

    // 1. 初始化網頁
    function init() {
      renderGrid();
      updateTotal();
    }

    // 2. 渲染 25 宮格
    function renderGrid() {
      const container = document.getElementById('gridContainer');
      container.innerHTML = '';
      const total = weights.reduce((a, b) => a + b, 0);

      weights.forEach((weight, index) => {
        const num = index + 1;
        const percentage = total === 0 ? '0.0' : ((weight / total) * 100).toFixed(1);
        const isZero = weight === 0;

        container.innerHTML += `
          <div class="relative p-3 rounded-2xl border-2 transition-all ${isZero ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-200 hover:border-indigo-300'}">
            <div class="absolute -top-3 -left-3 w-8 h-8 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold text-sm shadow">${num}</div>
            <div class="text-center mt-3 mb-3 text-2xl font-black ${isZero ? 'text-slate-300' : 'text-indigo-600'}">${percentage}<span class="text-sm font-medium ml-0.5">%</span></div>
            <div class="flex items-center justify-between bg-slate-100 rounded-lg p-1.5">
              <button onclick="updateWeight(${index}, -1)" class="w-8 h-8 bg-white rounded-md shadow-sm text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 font-bold transition">-</button>
              <span class="font-bold text-slate-700 w-8 text-center select-none">${weight}</span>
              <button onclick="updateWeight(${index}, 1)" class="w-8 h-8 bg-white rounded-md shadow-sm text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 font-bold transition">+</button>
            </div>
          </div>
        `;
      });
    }

    // 3. 更新權重
    function updateWeight(index, delta) {
      if (isDrawing) return;
      const newWeight = weights[index] + delta;
      if (newWeight >= 0 && newWeight <= 99) {
        weights[index] = newWeight;
        renderGrid();
        updateTotal();
      }
    }

    // 4. 重置權重
    function resetWeights() {
      if (isDrawing) return;
      weights = Array(25).fill(1);
      renderGrid();
      updateTotal();
    }

    // 更新總分顯示
    function updateTotal() {
      const total = weights.reduce((a, b) => a + b, 0);
      document.getElementById('totalWeightStr').innerText = total;
    }

    // 5. 抽獎邏輯
    function startDraw() {
      const total = weights.reduce((a, b) => a + b, 0);
      if (total === 0) return showMessage('所有號碼的概率均為 0，請至少提高一個號碼的概率才能進行抽獎！', 'error');
      
      isDrawing = true;
      document.getElementById('drawBtn').disabled = true;
      document.getElementById('drawBtn').innerHTML = '抽獎中...';
      const display = document.getElementById('displayNumber');
      display.classList.add('drawing-anim');

      let ticks = 0;
      const maxTicks = 20;
      const interval = setInterval(() => {
        display.innerText = Math.floor(Math.random() * 25) + 1;
        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(interval);
          finishDraw(total);
        }
      }, 80);
    }

    function finishDraw(totalWeight) {
      let randomVal = Math.random() * totalWeight;
      let winnerIndex = 0;
      for (let i = 0; i < weights.length; i++) {
        randomVal -= weights[i];
        if (randomVal <= 0) { winnerIndex = i; break; }
      }

      const winner = winnerIndex + 1;
      const display = document.getElementById('displayNumber');
      display.classList.remove('drawing-anim');
      display.innerText = winner;
      
      historyList.unshift(winner);
      if(historyList.length > 10) historyList.pop();
      updateHistoryUI();

      isDrawing = false;
      const drawBtn = document.getElementById('drawBtn');
      drawBtn.disabled = false;
      drawBtn.innerHTML = '▶ 開始抽獎';
    }

    function updateHistoryUI() {
      const container = document.getElementById('historyContainer');
      container.innerHTML = historyList.map((num, i) => 
        `<div class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg border-2 transition-all ${i===0 ? 'bg-indigo-100 border-indigo-500 text-indigo-700 scale-110 shadow-md' : 'bg-slate-50 border-slate-200 text-slate-500'}">${num}</div>`
      ).join('');
    }

    // 6. 雲端儲存 (Google Sheets)
    async function saveToCloud() {
      setLoading('saveSpinner', true);
      const codeInput = document.getElementById('syncCode');
      try {
        const res = await fetch(`${SCRIPT_URL}?action=save&data=${JSON.stringify(weights)}`);
        const json = await res.json();
        
        if (json.success) {
          codeInput.value = json.code;
          showMessage(`✅ 儲存成功！你的分享代碼是：${json.code}`, 'success');
        } else {
          showMessage('❌ 儲存失敗，請稍後再試。', 'error');
        }
      } catch(e) {
        showMessage('❌ 網路連線錯誤，請確認網路狀態。', 'error');
      }
      setLoading('saveSpinner', false);
    }

    // 7. 雲端讀取 (Google Sheets)
    async function loadFromCloud() {
      const codeInput = document.getElementById('syncCode');
      const code = codeInput.value.trim().toUpperCase();
      
      if(code.length !== 6) {
        return showMessage('⚠️ 請輸入完整的 6 碼分享代碼！', 'error');
      }

      setLoading('loadSpinner', true);
      try {
        const res = await fetch(`${SCRIPT_URL}?action=load&code=${code}`);
        const json = await res.json();
        
        if (json.success && Array.isArray(json.data) && json.data.length === 25) {
          weights = json.data;
          renderGrid();
          updateTotal();
          showMessage(`✅ 成功載入代碼 ${code} 的概率數據！`, 'success');
        } else {
          showMessage(`❌ ${json.message || '找不到此代碼的資料'}`, 'error');
        }
      } catch(e) {
        showMessage('❌ 網路連線錯誤，或是找不到對應代碼。', 'error');
      }
      setLoading('loadSpinner', false);
      codeInput.value = '';
    }

    function showMessage(msg, type) {
      const box = document.getElementById('messageBox');
      box.innerText = msg;
      if (type === 'error') {
        box.className = 'p-4 rounded-xl text-center font-bold text-sm mb-6 bg-red-50 text-red-600 border border-red-200 animate-pulse';
      } else {
        box.className = 'p-4 rounded-xl text-center font-bold text-sm mb-6 bg-green-50 text-green-700 border border-green-200';
      }
      box.classList.remove('hidden');
      setTimeout(() => { box.classList.add('hidden'); }, 4000);
    }

    function setLoading(spinnerId, isLoad) {
      document.getElementById(spinnerId).style.display = isLoad ? 'inline-block' : 'none';
      const btns = document.querySelectorAll('button');
      btns.forEach(btn => {
        if(btn.id !== 'drawBtn') btn.disabled = isLoad;
      });
    }

    init();
  </script>
</body>
</html>
