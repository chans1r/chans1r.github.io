<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Adult English Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .breathing-light { width: 8px; height: 8px; border-radius: 50%; background-color: #22c55e; box-shadow: 0 0 8px #22c55e; animation: breathe 2s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        .hide { display: none !important; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s; }
        .toast-exit-active { transform: translateY(100%); opacity: 0; transition: all 0.3s; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white"><i data-lucide="book-open" class="w-5 h-5"></i></div>
                <div>
                    <h1 class="font-bold text-lg leading-tight text-indigo-900">ESL Adult English Hub</h1>
                    <p class="text-xs text-slate-500">高階商務英語自主學習系統</p>
                </div>
            </div>

            <div id="auth-section" class="flex items-center gap-2">
                <input type="text" id="username-input" placeholder="輸入學員代號..." class="border border-slate-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-40">
                <button onclick="login()" id="login-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-md text-sm font-medium transition flex items-center gap-2">
                    <span>載入系統</span><i data-lucide="cloud-download" class="w-4 h-4"></i>
                </button>
            </div>

            <div id="user-status-section" class="hide flex items-center gap-4">
                <div class="flex items-center gap-2 text-sm bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                    <div class="breathing-light"></div><span class="font-medium text-slate-700 text-xs">☁️ 雲端即時同步中</span>
                </div>
                <div class="flex items-center gap-2 font-semibold text-indigo-800">
                    <i data-lucide="user" class="w-4 h-4"></i><span id="display-username"></span>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <div id="debug-panel" class="hide max-w-7xl mx-auto mt-4 px-4">
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-red-700 font-mono overflow-x-auto whitespace-pre-wrap shadow-sm">
            <strong>❌ 連線診斷報告：</strong><br><br><span id="debug-log"></span>
        </div>
    </div>

    <main id="main-content" class="hide flex-1 overflow-y-auto pb-20">
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-lg font-bold text-slate-800 mb-2">核心詞彙掌握</h3>
                    <div class="flex justify-between text-sm mb-1 font-medium"><span id="vocab-progress-text">0 / 0 字</span><span id="vocab-progress-pct">0%</span></div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5"><div id="vocab-progress-bar" class="bg-blue-500 h-2.5 rounded-full transition-all" style="width: 0%"></div></div>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-lg font-bold text-slate-800 mb-2">黃金搭配詞</h3>
                    <div class="flex justify-between text-sm mb-1 font-medium"><span id="colloc-progress-text">0 / 5 組</span><span id="colloc-progress-pct">0%</span></div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5"><div id="colloc-progress-bar" class="bg-amber-500 h-2.5 rounded-full transition-all" style="width: 0%"></div></div>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-lg font-bold text-slate-800 mb-2">28天閱讀挑戰</h3>
                    <div class="flex justify-between text-sm mb-1 font-medium"><span id="article-progress-text">0 / 28 篇</span><span id="article-progress-pct">0%</span></div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5"><div id="article-progress-bar" class="bg-emerald-500 h-2.5 rounded-full transition-all" style="width: 0%"></div></div>
                </div>
            </div>

            <div class="flex space-x-1 border-b border-slate-200 mb-6">
                <button onclick="switchTab('vocab')" id="tab-btn-vocab" class="px-6 py-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600">核心詞彙庫</button>
                <button onclick="switchTab('colloc')" id="tab-btn-colloc" class="px-6 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent">搭配詞轟炸</button>
                <button onclick="switchTab('reading')" id="tab-btn-reading" class="px-6 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent flex items-center gap-1">窄式輸入閱讀 <span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">28 Days</span></button>
            </div>

            <div id="tab-vocab" class="tab-content">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                        <h4 class="font-semibold text-slate-700">3000 Core Vocabulary</h4>
                        <div class="flex items-center gap-4 text-sm">
                            <button onclick="changePage(-1)" class="px-3 py-1 bg-white border border-slate-300 rounded hover:bg-slate-100">上一頁</button>
                            <span id="page-info" class="text-slate-600 font-medium">Page 1 / 1</span>
                            <button onclick="changePage(1)" class="px-3 py-1 bg-white border border-slate-300 rounded hover:bg-slate-100">下一頁</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-white border-b border-slate-200 text-sm text-slate-500">
                                    <th class="py-3 px-4 w-1/3">單字</th>
                                    <th class="py-3 px-4 w-1/2">詞性 & 釋義</th>
                                    <th class="py-3 px-4 text-center">狀態</th>
                                </tr>
                            </thead>
                            <tbody id="vocab-table-body" class="text-sm divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-colloc" class="tab-content hide">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 max-h-[600px] overflow-y-auto">
                        <h4 class="font-semibold text-slate-800 mb-4">搭配詞圖鑑</h4>
                        <div id="colloc-list" class="space-y-3"></div>
                    </div>
                    <div class="bg-slate-800 rounded-xl shadow-sm border border-slate-700 p-6 text-white h-[400px]">
                        <h4 class="font-semibold text-amber-400 mb-2">句子重組挑戰</h4>
                        <p class="text-slate-400 text-sm mb-6">點擊下方詞塊，依序拼出正確的搭配詞。</p>
                        <div class="mb-4"><span class="text-sm text-slate-400">目標：</span><div id="challenge-zh" class="text-xl font-bold mt-1"></div></div>
                        <div class="min-h-[60px] bg-slate-900 rounded-lg p-3 mb-6 flex flex-wrap gap-2 items-center border border-slate-700" id="challenge-answer-area"></div>
                        <div class="flex flex-wrap gap-2" id="challenge-words-area"></div>
                    </div>
                </div>
            </div>

            <div id="tab-reading" class="tab-content hide">
                <div class="flex flex-col lg:flex-row gap-6">
                    <div class="lg:w-1/4 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[600px]">
                        <div class="p-4 bg-slate-50 border-b border-slate-200">
                            <h4 class="font-bold text-slate-800">28-Day Challenge</h4>
                            <p class="text-xs text-slate-500 mt-1">商業生存與敏捷管理主題</p>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="article-list-container"></div>
                    </div>
                    <div class="lg:w-3/4 bg-white rounded-xl shadow-sm border border-slate-200 p-8 relative min-h-[600px]">
                        <span id="current-day-label" class="text-xs font-bold tracking-wider text-indigo-600 uppercase mb-2 block">Day 1</span>
                        <h2 class="text-3xl font-bold text-slate-900 mb-6 pb-4 border-b border-slate-100" id="article-title"></h2>
                        <div id="article-content" class="text-slate-700 leading-loose text-lg font-serif"></div>
                        <div class="absolute bottom-8 right-8">
                            <button id="mark-read-btn" onclick="markCurrentArticleRead()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-medium shadow-md transition flex items-center gap-2">
                                <i data-lucide="check-circle" class="w-5 h-5"></i> 標記本篇已完讀
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

    <script>
        // ==========================================
        // 🌟 語音朗讀核心功能 (Web Speech API)
        // ==========================================
        function playAudio(text, lang = 'en-US', rate = 0.9) {
            if (!('speechSynthesis' in window)) {
                showToast("您的設備不支援語音功能", "error");
                return;
            }
            
            // 💡 關鍵修復 iOS 問題：先強制中斷上一句，避免列隊卡死
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang; // 預設美式英文
            utterance.rate = rate; // 語速稍微調慢 (0.9)，適合學習者
            utterance.pitch = 1.0; 
            
            window.speechSynthesis.speak(utterance);
        }

        // ==========================================
        // GAS API URL
        // ==========================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzEuBwfIF02za30_aurDXMsbhLzxYnlBBQ5n8TULjWIE0kbwMhzb_-weyef7VaxVPwqSQ/exec"; 
        
        let dbVocab = []; 
        const dbColloc = [
            { id: 'c1', phrase: 'reach a consensus', zh: '達成共識', words: ['reach', 'a', 'consensus'] },
            { id: 'c2', phrase: 'mitigate risks', zh: '降低風險', words: ['mitigate', 'risks'] },
            { id: 'c3', phrase: 'allocate resources', zh: '分配資源', words: ['allocate', 'resources'] },
            { id: 'c4', phrase: 'streamline operations', zh: '簡化營運', words: ['streamline', 'operations'] },
            { id: 'c5', phrase: 'gain a competitive edge', zh: '獲得優勢', words: ['gain', 'a', 'competitive', 'edge'] }
        ];

        // 產生 28 天文章資料
        const dbArticles = [];
        const baseTopics = ["Surviving in a Volatile Market", "Implementing Agile Methods", "Mitigating Financial Risks", "Allocating Resources Efficiently", "Gaining a Competitive Edge"];
        for (let i = 1; i <= 28; i++) {
            let topic = baseTopics[(i - 1) % baseTopics.length];
            dbArticles.push({
                id: 'd' + i, day: i, title: `Day ${i}: ${topic}`,
                content: `As we explore <b>${topic}</b>, leaders are required to <span class="vocab-link text-blue-600 underline cursor-pointer" data-id="v1">implement</span> strong frameworks to <span class="vocab-link text-blue-600 underline cursor-pointer" data-id="v3">mitigate</span> unnecessary risks.<br><br><em>(Day ${i} Module)</em>`
            });
        }

        let appState = { username: '', data: { vocab: {}, colloc: {}, article: {} } };
        let syncTimeout = null;
        let currentPage = 1;
        const itemsPerPage = 50;
        let currentReadingDayId = 'd1';

        // 幫手：顯示除錯訊息
        function logError(title, err) {
            console.error(title, err);
            const panel = document.getElementById('debug-panel');
            const log = document.getElementById('debug-log');
            panel.classList.remove('hide');
            log.innerHTML += `[${new Date().toLocaleTimeString()}] ${title}:<br>${err.message || err}<br><br>`;
        }

        // ==========================================
        // API 載入系統
        // ==========================================
        async function login() {
            document.getElementById('debug-panel').classList.add('hide'); 
            document.getElementById('debug-log').innerHTML = '';
            
            let input = document.getElementById('username-input').value.trim().toLowerCase();
            if (input.length < 3) return alert("學員代號必須至少 3 個字元");

            const btn = document.getElementById('login-btn');
            btn.innerHTML = `載入進度中... ⏳`; btn.disabled = true;

            try {
                const resProgress = await fetch(`${GAS_API_URL}?action=getProgress&username=${input}`, {
                    method: 'GET', mode: 'cors', redirect: 'follow'
                });
                
                if (!resProgress.ok) throw new Error(`HTTP Error: ${resProgress.status}`);
                const progressText = await resProgress.text();
                
                try {
                    const progressJson = JSON.parse(progressText);
                    appState.data = progressJson.success ? progressJson.data : { vocab: {}, colloc: {}, article: {} };
                } catch(e) {
                    throw new Error(`解析進度 JSON 失敗`);
                }
                
                appState.username = input;

                btn.innerHTML = `載入題庫中... 📥`;
                let cachedVocab = localStorage.getItem('esl_vocab_db');
                if (cachedVocab && JSON.parse(cachedVocab).length > 0) {
                    dbVocab = JSON.parse(cachedVocab);
                } else {
                    const resVocab = await fetch(`${GAS_API_URL}?action=getVocab`, { 
                        method: 'GET', mode: 'cors', redirect: 'follow'
                    });
                    const vocabText = await resVocab.text();
                    try {
                        const vocabJson = JSON.parse(vocabText);
                        if(vocabJson.success && vocabJson.data.length > 0) {
                            dbVocab = vocabJson.data;
                            localStorage.setItem('esl_vocab_db', JSON.stringify(dbVocab));
                        } else {
                            throw new Error("API 成功回傳，但單字庫為空");
                        }
                    } catch(e) {
                         throw new Error(`解析單字庫 JSON 失敗`);
                    }
                }

                document.getElementById('auth-section').classList.add('hide');
                document.getElementById('user-status-section').classList.remove('hide');
                document.getElementById('display-username').innerText = input;
                document.getElementById('main-content').classList.remove('hide');
                initApp();

            } catch(e) {
                logError("❌ 登入 API 連線失敗", e);
                btn.innerHTML = `載入系統`; btn.disabled = false;
                alert("連線失敗！請查看網頁上方的紅色診斷報告。");
            }
        }

        function logout() { location.reload(); }

        // ==========================================
        // 背景儲存
        // ==========================================
        function updateProgress(category, id, status) {
            appState.data[category][id] = status;
            renderDashboard(); 
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => { syncToCloud(); }, 1500);
        }

       async function syncToCloud() {
            showToast('同步進度至雲端中...', 'info');
            try {
                const res = await fetch(GAS_API_URL, {
                    method: 'POST', mode: 'cors', redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ username: appState.username, ...appState.data })
                });
                const resultText = await res.text();
                const result = JSON.parse(resultText);
                if(result.success) showToast('✅ 雲端同步完成');
                else throw new Error("API 返回了失敗狀態");
            } catch (e) {
                console.error("Sync Error:", e);
                showToast('⚠️ 同步失敗，已保留於本機', 'error');
            }
        }

        function initApp() {
            renderDashboard(); renderVocab(); renderColloc(); initChallenge(); renderArticleList(); loadArticle(currentReadingDayId); lucide.createIcons();
        }

        function switchTab(tabId) {
            ['vocab', 'colloc', 'reading'].forEach(id => {
                document.getElementById(`tab-${id}`).classList.add('hide');
                document.getElementById(`tab-btn-${id}`).classList.remove('text-indigo-600', 'border-indigo-600');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hide');
            document.getElementById(`tab-btn-${tabId}`).classList.add('text-indigo-600', 'border-indigo-600');
        }

        function renderDashboard() {
            const vocabLearned = Object.values(appState.data.vocab).filter(v => v === 'mastered').length;
            const totalVocab = dbVocab.length || 3000;
            const vocabPct = Math.round((vocabLearned / totalVocab) * 100) || 0;
            document.getElementById('vocab-progress-text').innerText = `${vocabLearned} / ${totalVocab} 字`;
            document.getElementById('vocab-progress-pct').innerText = `${vocabPct}%`;
            document.getElementById('vocab-progress-bar').style.width = `${vocabPct}%`;

            const collocLearned = Object.values(appState.data.colloc).filter(v => v === true).length;
            document.getElementById('colloc-progress-text').innerText = `${collocLearned} / ${dbColloc.length} 組`;
            document.getElementById('colloc-progress-pct').innerText = `${Math.round((collocLearned / dbColloc.length)*100)}%`;
            document.getElementById('colloc-progress-bar').style.width = `${Math.round((collocLearned / dbColloc.length)*100)}%`;

            const articleLearned = Object.values(appState.data.article).filter(v => v === true).length;
            const articlePct = Math.round((articleLearned / 28) * 100);
            document.getElementById('article-progress-text').innerText = `${articleLearned} / 28 篇`;
            document.getElementById('article-progress-pct').innerText = `${articlePct}%`;
            document.getElementById('article-progress-bar').style.width = `${articlePct}%`;
        }

        function changePage(delta) {
            if(dbVocab.length === 0) return;
            const maxPage = Math.ceil(dbVocab.length / itemsPerPage);
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > maxPage) currentPage = maxPage;
            renderVocab();
        }

        // ==========================================
        // 渲染單字庫 (已加入單字與例句發音按鈕)
        // ==========================================
        function renderVocab() {
            if(dbVocab.length === 0) return;
            const maxPage = Math.ceil(dbVocab.length / itemsPerPage);
            document.getElementById('page-info').innerText = `Page ${currentPage} / ${maxPage}`;
            
            const startIdx = (currentPage - 1) * itemsPerPage;
            const pageData = dbVocab.slice(startIdx, startIdx + itemsPerPage);

            document.getElementById('vocab-table-body').innerHTML = pageData.map(item => {
                const status = appState.data.vocab[item.id] || 'not_started';
                
                // 防止字串中帶有單引號導致 onclick 錯誤
                const safeWord = item.word ? item.word.replace(/'/g, "\\'") : '';
                const safeEx = item.ex ? item.ex.replace(/'/g, "\\'") : '';
                
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="py-3 px-4">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-slate-800 text-base">${item.word}</span>
                                <button onclick="playAudio('${safeWord}')" title="朗讀單字" class="text-slate-400 hover:text-indigo-600 transition-colors p-1.5 hover:bg-indigo-50 rounded-full flex items-center justify-center">
                                    <i data-lucide="volume-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                        <td class="py-3 px-4">
                            <div class="mb-1">
                                <span class="text-indigo-600 font-semibold text-xs mr-1">${item.pos}</span>
                                <span class="text-slate-700 font-medium">${item.zh}</span>
                            </div>
                            <div class="text-slate-500 italic text-xs flex items-start gap-1">
                                <button onclick="playAudio('${safeEx}', 'en-US', 0.85)" title="朗讀例句" class="text-slate-400 hover:text-indigo-600 flex-shrink-0 mt-0.5 p-1 hover:bg-indigo-50 rounded-full transition-colors">
                                    <i data-lucide="volume-2" class="w-3.5 h-3.5"></i>
                                </button>
                                <span class="mt-1">${item.ex}</span>
                            </div>
                        </td>
                        <td class="py-3 px-4 text-center">
                            <select onchange="updateProgress('vocab', '${item.id}', this.value); renderVocab();" class="border border-slate-300 rounded text-sm p-1.5 outline-none font-medium ${status === 'mastered' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-white'}">
                                <option value="not_started" ${status === 'not_started' ? 'selected' : ''}>未開始</option>
                                <option value="learning" ${status === 'learning' ? 'selected' : ''}>學習中</option>
                                <option value="mastered" ${status === 'mastered' ? 'selected' : ''}>✅ 已掌握</option>
                            </select>
                        </td>
                    </tr>
                `;
            }).join('');
            
            // 每次重新渲染列表後，必須重新呼叫圖示生成
            lucide.createIcons();
        }

        function renderArticleList() {
            document.getElementById('article-list-container').innerHTML = dbArticles.map(article => {
                const isRead = appState.data.article[article.id] === true;
                const isActive = article.id === currentReadingDayId;
                return `
                    <button onclick="loadArticle('${article.id}')" class="w-full text-left px-4 py-3 rounded-lg flex items-center justify-between transition-colors ${isActive ? 'bg-indigo-50 border border-indigo-200' : 'hover:bg-slate-100 border border-transparent'}">
                        <div><span class="text-sm font-bold ${isActive ? 'text-indigo-700' : 'text-slate-700'}">Day ${article.day}</span></div>
                        ${isRead ? `<i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i>` : `<div class="w-4 h-4 rounded-full border-2 border-slate-300"></div>`}
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        function loadArticle(id) {
            currentReadingDayId = id;
            const article = dbArticles.find(a => a.id === id);
            document.getElementById('current-day-label').innerText = `Day ${article.day}`;
            document.getElementById('article-title').innerText = article.title;
            document.getElementById('article-content').innerHTML = article.content;
            
            const isRead = appState.data.article[id] === true;
            const btn = document.getElementById('mark-read-btn');
            if(isRead) { btn.classList.replace('bg-emerald-600', 'bg-slate-300'); btn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> 已完讀`; btn.disabled = true; } 
            else { btn.classList.replace('bg-slate-300', 'bg-emerald-600'); btn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i> 標記本篇已完讀`; btn.disabled = false; }

            document.querySelectorAll('.vocab-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    updateProgress('vocab', e.target.getAttribute('data-id'), 'mastered');
                    showToast('✅ 閱讀中標記單字掌握！');
                    renderVocab();
                });
            });
            renderArticleList();
        }

        function markCurrentArticleRead() {
            updateProgress('article', currentReadingDayId, true);
            showToast(`📖 完成 Day ${dbArticles.find(a=>a.id===currentReadingDayId).day} 訓練！`);
            loadArticle(currentReadingDayId); 
            const currIndex = dbArticles.findIndex(a => a.id === currentReadingDayId);
            if(currIndex < dbArticles.length - 1) setTimeout(() => loadArticle(dbArticles[currIndex + 1].id), 1000);
        }

        // ==========================================
        // 渲染搭配詞 (已加入發音按鈕)
        // ==========================================
        function renderColloc() {
            document.getElementById('colloc-list').innerHTML = dbColloc.map(item => {
                const isMastered = appState.data.colloc[item.id] === true;
                const safePhrase = item.phrase.replace(/'/g, "\\'");
                return `<div class="flex items-center justify-between p-3 rounded-lg border ${isMastered ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-50 border-slate-200'}">
                    <div class="flex items-center gap-2">
                        <div>
                            <p class="font-bold text-slate-800 ${isMastered ? 'text-emerald-800' : ''}">${item.phrase}</p>
                            <p class="text-sm text-slate-500">${item.zh}</p>
                        </div>
                        <button onclick="playAudio('${safePhrase}')" class="text-slate-400 hover:text-indigo-600 transition-colors p-2 hover:bg-slate-200 rounded-full ml-1">
                            <i data-lucide="volume-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    ${isMastered ? `<i data-lucide="check-circle-2" class="text-emerald-500 w-6 h-6"></i>` : `<button onclick="updateProgress('colloc', '${item.id}', true); renderColloc();" class="text-xs font-medium border border-slate-300 bg-white hover:bg-slate-100 px-3 py-1.5 rounded-md transition-colors">標記掌握</button>`}
                </div>`;
            }).join('');
            lucide.createIcons(); // 必須重新產生圖示
        }

        let currentChallengeIndex = 0, selectedWords = [];
        function initChallenge() {
            if (currentChallengeIndex >= dbColloc.length) return document.getElementById('challenge-zh').innerText = "🎉 全數過關！";
            const currentObj = dbColloc[currentChallengeIndex];
            selectedWords = [];
            document.getElementById('challenge-zh').innerText = currentObj.zh;
            renderChallengeBoard([...currentObj.words].sort(() => Math.random() - 0.5), currentObj.words);
        }

        function renderChallengeBoard(avail, target) {
            document.getElementById('challenge-answer-area').innerHTML = selectedWords.length === 0 ? `<span class="text-slate-600">點擊下方詞塊...</span>` : selectedWords.map((w, idx) => `<div onclick="removeWord(${idx})" class="bg-indigo-600 cursor-pointer text-white px-3 py-1.5 rounded shadow-sm">${w}</div>`).join('');
            document.getElementById('challenge-words-area').innerHTML = avail.map((w, idx) => `<button onclick="selectWord('${w}', ${idx})" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg">${w}</button>`).join('');

            if (selectedWords.length === target.length) {
                if (selectedWords.join(' ') === target.join(' ')) {
                    showToast('🎉 答對了！'); updateProgress('colloc', dbColloc[currentChallengeIndex].id, true); renderColloc();
                    setTimeout(() => { currentChallengeIndex++; initChallenge(); }, 1500);
                } else { setTimeout(() => initChallenge(), 800); }
            }
        }
        window.selectWord = (w, idx) => { selectedWords.push(w); let avail = Array.from(document.getElementById('challenge-words-area').children).map(b => b.innerText); avail.splice(idx, 1); renderChallengeBoard(avail, dbColloc[currentChallengeIndex].words); };
        window.removeWord = (idx) => { let w = selectedWords[idx]; selectedWords.splice(idx, 1); let avail = Array.from(document.getElementById('challenge-words-area').children).map(b => b.innerText); avail.push(w); renderChallengeBoard(avail, dbColloc[currentChallengeIndex].words); };

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter-active ${type === 'success' ? 'bg-slate-800' : 'bg-red-600'} text-white px-4 py-3 rounded-lg shadow-lg flex items-center text-sm font-medium`;
            toast.innerHTML = `<span>${msg}</span>`; container.appendChild(toast);
            setTimeout(() => { toast.classList.replace('toast-enter-active', 'toast-exit-active'); setTimeout(() => toast.remove(), 300); }, 2000);
        }
        lucide.createIcons();
    </script>
</body>
</html>
