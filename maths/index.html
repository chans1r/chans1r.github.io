<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秀明小學 數學科 | 網頁程序資源庫</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page:    '#F5F5F7',
            surface: '#FFFFFF',
            text:    '#1D1D1F',
            muted:   '#86868B',
            border:  '#D2D2D7',
            pine:    '#1A2352',
            mint:    '#2C3A73',
            peach:   '#C42127',
            gold:    '#DDB52A',
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          boxShadow: {
            'apple': '0 4px 24px rgba(0, 0, 0, 0.04)',
            'float': '0 20px 40px rgba(26, 35, 82, 0.15)',
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background-color: #F5F5F7; color: #1D1D1F; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden;}
    
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #D2D2D7; border-radius: 10px; }
    
    input:focus, textarea:focus, select:focus { outline: 2px solid #1A2352; outline-offset: -1px; }

    .page-section { display: none; }
    .page-section.active { display: block; animation: fadeIn 0.4s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .artwork-card { transition: all 0.3s ease; }
    .artwork-card:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(0,0,0,0.06); }

    .tag-g1 { background: #E0F2FE; color: #0284C7; } 
    .tag-g2 { background: #FCE7F3; color: #DB2777; } 
    .tag-g3 { background: #FEF3C7; color: #D97706; } 
    .tag-g4 { background: #DCFCE7; color: #16A34A; } 
    .tag-g5 { background: #F3E8FF; color: #9333EA; } 
    .tag-g6 { background: #FFEDD5; color: #EA580C; } 
    
    .grade-btn { transition: all 0.2s ease; border: 2px solid transparent; }
    .grade-btn.active { border-color: #1A2352; transform: scale(1.05); font-weight: bold; }

    #htmlCode, .code-viewer { font-family: 'Courier New', Courier, monospace; font-size: 13px; line-height: 1.6; background-color: #1E1E1E; color: #D4D4D4; resize: none; }
    
    #profilePanel { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.hide { opacity: 0; transform: translateY(20px); pointer-events: none; }
  </style>
</head>

<body>

<!-- ① 頂部導覽列 -->
<header class="sticky top-0 z-40 glass border-b border-border">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
    <button onclick="showSection('gallery')" class="flex items-center gap-3 group">
      <div class="w-10 h-10 rounded-xl bg-pine flex items-center justify-center relative overflow-hidden border border-pine/20">
        <div class="absolute top-0 right-0 w-4 h-4 bg-peach rounded-bl-full opacity-80"></div>
        <div class="absolute bottom-0 left-0 w-3 h-3 bg-gold rounded-tr-full opacity-80"></div>
        <span class="text-white font-serif font-bold text-xl z-10">數</span>
      </div>
      <div class="leading-tight text-left">
        <span class="font-bold text-[17px] text-text block">秀明小學 數學科</span>
        <span class="text-peach text-[10px] font-bold uppercase">Teacher Coding Gallery</span>
      </div>
    </button>

    <div id="headerFilters" class="hidden md:flex items-center gap-2">
      <button onclick="filterGallery('全部',this)" class="px-4 py-1.5 rounded-full text-sm font-semibold bg-text text-white">全部作品</button>
      <button onclick="filterGallery('一年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">一年級</button>
      <button onclick="filterGallery('二年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">二年級</button>
      <button onclick="filterGallery('三年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">三年級</button>
      <button onclick="filterGallery('四年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">四年級</button>
      <button onclick="filterGallery('五年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">五年級</button>
      <button onclick="filterGallery('六年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">六年級</button>
    </div>

    <div class="flex items-center gap-3">
      <!-- 訪客狀態 -->
      <div id="navGuest" class="flex items-center gap-3">
        <button onclick="showSection('auth'); switchAuthTab('login');" class="text-sm font-medium text-text hover:text-pine">登入</button>
        <button onclick="showSection('auth'); switchAuthTab('register');" class="text-sm px-5 py-2 rounded-full bg-pine text-white hover:bg-mint font-medium shadow-sm">註冊帳號</button>
      </div>
      <!-- 登入狀態 -->
      <div id="navUser" class="hidden items-center gap-4">
        <button onclick="showSection('upload')" class="text-sm px-4 py-2 rounded-full bg-pine text-white hover:bg-mint font-medium flex items-center gap-1.5 shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>發佈
        </button>
        <button onclick="openProfilePanel()" class="flex items-center gap-2 pl-3 border-l border-border hover:opacity-80 transition-opacity">
          <div class="w-8 h-8 rounded-full bg-peach text-white flex items-center justify-center font-bold text-sm shadow-sm" id="avatarInitial">T</div>
          <span class="text-sm font-semibold text-text" id="avatarUsername">姓名</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-10">

  <!-- 【登入系統 (自訂帳號與密碼)】 -->
  <section id="section-auth" class="page-section">
    <div class="max-w-sm mx-auto mt-10">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-text mb-2">教師平台登入</h1>
        <p class="text-sm text-muted">請登入或註冊您的專屬教學帳號</p>
      </div>
      
      <div class="bg-surface rounded-2xl shadow-apple p-8 border border-border/50">
        <!-- 切換 Tab -->
        <div class="flex bg-page rounded-xl p-1 mb-8">
          <button id="tabLogin" onclick="switchAuthTab('login')" class="flex-1 py-2 text-sm font-bold rounded-lg bg-surface shadow-sm text-text">登入</button>
          <button id="tabRegister" onclick="switchAuthTab('register')" class="flex-1 py-2 text-sm font-medium rounded-lg text-muted">註冊</button>
        </div>

        <!-- 登入表單 -->
        <div id="loginForm" class="space-y-5">
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">登入帳號 <span class="text-pine">(@前的代號，如：123)</span></label>
            <input type="text" id="loginAccount" placeholder="例如：123" class="w-full px-4 py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">密碼</label>
            <input type="password" id="loginPassword" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div id="loginError" class="hidden text-peach text-sm font-bold mt-2"></div>
          <button onclick="handleLogin()" class="w-full py-3.5 bg-pine text-white rounded-xl font-bold hover:bg-mint shadow-sm mt-4">
            登入系統
          </button>
        </div>

        <!-- 註冊表單 -->
        <div id="registerForm" class="hidden space-y-5">
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">註冊帳號 <span class="text-pine">(@前的代號，如：123)</span></label>
            <input type="text" id="regAccount" placeholder="例如：123" class="w-full px-4 py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">您的姓名 (系統將自動加「老師」)</label>
            <div class="relative flex items-center">
              <input type="text" id="regName" placeholder="例如：陳大文" class="w-full px-4 py-3 rounded-xl border border-border bg-page text-sm focus:bg-white pr-16"/>
              <span class="absolute right-4 text-sm font-bold text-pine pointer-events-none">老師</span>
            </div>
          </div>
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">設定密碼 (至少6位數)</label>
            <input type="password" id="regPassword" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div id="registerError" class="hidden text-peach text-sm font-bold mt-2"></div>
          <button onclick="handleRegister()" class="w-full py-3.5 bg-pine text-white rounded-xl font-bold hover:bg-mint shadow-sm mt-4">
            建立帳號
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- 【發佈與編輯】 -->
  <section id="section-upload" class="page-section">
    <div class="max-w-6xl mx-auto">
      <div class="flex items-center gap-2 mb-6">
        <button onclick="showSection('gallery')" class="w-8 h-8 rounded-full hover:bg-gray-200 flex items-center justify-center text-muted"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
        <h2 class="text-2xl font-bold text-text" id="uploadPageTitle">發佈新網頁</h2>
      </div>

      <div class="bg-surface rounded-2xl shadow-apple border border-border/50 overflow-hidden">
        <div class="p-6 border-b border-border bg-gray-50 flex flex-col md:flex-row gap-6">
          <div class="flex-1 space-y-4">
            <div>
              <label class="text-sm font-bold text-text mb-2 block">1. 作品名稱</label>
              <input type="text" id="artworkTitle" placeholder="例如：互動幾何計算器" class="w-full px-4 py-2.5 rounded-xl border border-border bg-white text-base shadow-sm"/>
            </div>
            <div>
              <label class="text-sm font-bold text-text mb-2 block">2. 跳轉連結 (必填)</label>
              <input type="url" id="artworkUrl" placeholder="https://example.com" class="w-full px-4 py-2.5 rounded-xl border border-border bg-white text-base shadow-sm"/>
              <p class="text-xs text-muted mt-1">使用者點擊時，將強制於新分頁導向此網址。</p>
            </div>
          </div>
          <div>
            <label class="text-sm font-bold text-text mb-2 block">3. 適用年級</label>
            <div class="flex flex-wrap gap-2">
              <button onclick="selectGrade(this,'一年級')" class="grade-btn px-4 py-2 rounded-xl text-sm bg-white border-border text-muted shadow-sm">一年級</button>
              <button onclick="selectGrade(this,'二年級')" class="grade-btn px-4 py-2 rounded-xl text-sm bg-white border-border text-muted shadow-sm">二年級</button>
              <button onclick="selectGrade(this,'三年級')" class="grade-btn px-4 py-2 rounded-xl text-sm bg-white border-border text-muted shadow-sm">三年級</button>
              <button onclick="selectGrade(this,'四年級')" class="grade-btn px-4 py-2 rounded-xl text-sm bg-white border-border text-muted shadow-sm">四年級</button>
              <button onclick="selectGrade(this,'五年級')" class="grade-btn px-4 py-2 rounded-xl text-sm bg-white border-border text-muted shadow-sm">五年級</button>
              <button onclick="selectGrade(this,'六年級')" class="grade-btn px-4 py-2 rounded-xl text-sm bg-white border-border text-muted shadow-sm">六年級</button>
            </div>
            <input type="hidden" id="selectedGrade" />
            <input type="hidden" id="editingWorkId" />
          </div>
        </div>

        <div class="flex flex-col lg:flex-row h-[500px]">
          <div class="flex-1 flex flex-col border-r border-border">
            <div class="px-4 py-2 bg-pine text-white text-xs font-bold flex justify-between items-center tracking-wider">
              <span><span class="text-peach">●</span> <span class="text-gold">●</span> <span class="text-green-400">●</span> HTML 代碼編輯區</span>
            </div>
            <textarea id="htmlCode" oninput="updateLivePreview()" class="flex-1 w-full p-5 focus:outline-none" placeholder="<!DOCTYPE html><html><body><h1>輸入代碼</h1></body></html>"></textarea>
          </div>
          <div class="flex-1 flex flex-col bg-white">
            <div class="px-4 py-2 bg-gray-100 border-b border-border text-xs font-bold text-muted flex items-center gap-2">
              <svg class="w-4 h-4 text-pine" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>即時預覽
            </div>
            <div class="flex-1 overflow-hidden relative">
              <iframe id="livePreviewIframe" sandbox="allow-scripts" class="absolute inset-0 w-full h-full border-none bg-white"></iframe>
            </div>
          </div>
        </div>

        <div class="p-4 border-t border-border bg-gray-50 flex items-center justify-end">
          <button onclick="handleUpload()" id="uploadBtn" class="px-8 py-3 bg-pine text-white rounded-xl font-bold text-sm hover:bg-mint shadow-sm">
            儲存並發佈
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- 【作品大廳】 -->
  <section id="section-gallery" class="page-section active">
    <div class="relative bg-pine rounded-[2rem] overflow-hidden mb-12 px-8 py-14 shadow-float">
      <div class="absolute top-0 right-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute -right-20 -top-20 w-96 h-96 bg-peach rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
        <div class="absolute right-40 -bottom-20 w-80 h-80 bg-gold rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
      </div>
      <div class="relative z-10 max-w-3xl">
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-white/10 rounded-full text-gold text-xs font-bold tracking-widest uppercase mb-5 backdrop-blur-md">
          <span class="w-2 h-2 rounded-full bg-peach"></span>Teacher Code Gallery
        </div>
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-5 leading-tight">程式教學資源庫</h1>
        <p class="text-white/80 text-lg leading-relaxed mb-8 font-medium max-w-xl">
          匯聚老師們的心血結晶。<br/>點擊卡片即可安全預覽網頁，或開啟獨立分頁進行教學。
        </p>
      </div>
    </div>
    <div id="artworkGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    <div id="emptyState" class="hidden text-center py-24">
      <p class="text-text font-bold text-lg">此分類尚無網頁作品</p>
    </div>
  </section>
</main>

<!-- ③ 側邊欄：個人作品與歷史紀錄管理 -->
<div id="profileOverlay" class="hidden fixed inset-0 z-40 bg-text/20 backdrop-blur-sm transition-opacity" onclick="closeProfilePanel()"></div>
<aside id="profilePanel" class="fixed top-0 right-0 h-full w-full sm:w-[400px] z-50 bg-surface shadow-float flex flex-col translate-x-full">
  <div class="px-6 py-5 border-b border-border bg-page flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-pine text-white flex justify-center items-center font-bold" id="panelAvatar">T</div>
      <div>
        <h3 class="font-bold text-text text-base" id="panelName">姓名</h3>
        <p class="text-xs text-muted">我的作品庫</p>
      </div>
    </div>
    <div class="flex gap-2">
      <button onclick="handleLogout()" class="text-xs font-bold text-peach bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100">登出</button>
      <button onclick="closeProfilePanel()" class="w-8 h-8 flex justify-center items-center bg-gray-200 rounded-full hover:bg-gray-300">✕</button>
    </div>
  </div>
  
  <div class="flex-1 overflow-y-auto p-6 bg-white space-y-4" id="profileWorksList">
    <!-- 個人作品清單會渲染在這裡 -->
  </div>
</aside>

<!-- ④ 歷史代碼檢視彈窗 -->
<div id="historyModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-text/60 backdrop-blur-sm">
  <div class="bg-surface w-full max-w-4xl h-[80vh] rounded-2xl shadow-float flex flex-col overflow-hidden">
    <div class="px-6 py-4 border-b border-border flex justify-between items-center bg-page">
      <h3 class="font-bold text-lg text-text" id="historyModalTitle">歷史代碼檢視</h3>
      <button onclick="closeHistoryModal()" class="w-8 h-8 flex justify-center items-center bg-gray-200 rounded-full hover:bg-gray-300">✕</button>
    </div>
    <div class="flex-1 flex overflow-hidden">
      <!-- 左側版本清單 -->
      <div class="w-1/3 border-r border-border bg-gray-50 overflow-y-auto p-4 space-y-2" id="historyVersionList"></div>
      <!-- 右側代碼顯示 -->
      <div class="w-2/3 flex flex-col bg-[#1E1E1E]">
        <div class="px-4 py-2 bg-pine text-white text-xs font-bold flex justify-between items-center">
          <span>完整 HTML 代碼</span>
          <button id="copyHistoryBtn" class="bg-white/20 px-2 py-1 rounded hover:bg-white/30 transition">複製代碼</button>
        </div>
        <textarea id="historyCodeViewer" readonly class="code-viewer flex-1 w-full p-4 focus:outline-none"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- ⑤ 作品預覽彈窗 -->
<div id="previewModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-text/40 backdrop-blur-sm">
  <div class="bg-surface w-full max-w-5xl h-[85vh] rounded-2xl shadow-float flex flex-col overflow-hidden">
    <div class="flex items-center justify-between px-6 py-4 border-b border-border bg-page">
      <div>
        <h3 id="modalTitle" class="text-lg font-bold text-text">作品標題</h3>
        <p id="modalAuthor" class="text-sm font-medium text-muted mt-0.5">作者</p>
      </div>
      <div class="flex items-center gap-3">
        <!-- 獨立跳轉網址 -->
        <button onclick="openStandaloneWork()" class="flex items-center gap-1.5 px-4 py-2 rounded-full bg-pine text-white text-sm font-bold hover:bg-mint shadow-sm">
          前往作品網頁 (在新分頁開啟)
        </button>
        <button onclick="closePreview()" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-200 hover:bg-gray-300">✕</button>
      </div>
    </div>
    <div class="flex-1 bg-white relative">
      <iframe id="modalIframe" sandbox="allow-scripts" class="w-full h-full border-none"></iframe>
    </div>
  </div>
</div>

<div id="toast" class="hide fixed bottom-10 left-1/2 -translate-x-1/2 z-50 px-6 py-3 bg-text text-white rounded-full shadow-float text-sm font-bold flex items-center gap-3">
  <span id="toastMsg">操作成功！</span>
</div>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Firebase SDK 引入與系統邏輯
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  // 🔴🔴🔴 請將這裡的 firebaseConfig 替換成您自己的 🔴🔴🔴
  const firebaseConfig = {
  apiKey: "AIzaSyAoof3IOjEKOJrN-FlH70D3qin0CF1vO5E",
  authDomain: "smpsmaths-aa040.firebaseapp.com",
  projectId: "smpsmaths-aa040",
  storageBucket: "smpsmaths-aa040.firebasestorage.app",
  messagingSenderId: "870771862504",
  appId: "1:870771862504:web:ab5ca008d6a5b881f0525d",
  measurementId: "G-8SXJLPE0YM"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 全域變數與常數
  const EMAIL_DOMAIN = '@saumingps.edu.hk';
  let currentUser = null; 
  let allWorks = []; 
  let currentFilter = '全部';
  let currentPreviewUrl = '';

  const formatLink = (url) => {
    if(!url) return '#';
    if (!url.startsWith('http://') && !url.startsWith('https://')) return 'https://' + url;
    return url;
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 工具與 UI 函式
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.showSection = (id) => {
    document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
    document.getElementById('section-' + id).classList.add('active');
    document.getElementById('headerFilters').style.display = (id === 'gallery') ? 'flex' : 'none';
    if (id === 'upload' && !document.getElementById('editingWorkId').value) window.resetUploadForm();
    if (id === 'gallery') window.renderGallery(currentFilter);
    window.scrollTo(0,0);
  };

  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.remove('hide'); t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); t.classList.add('hide'); }, 2500);
  };

  window.showErr = (id, msg) => {
    const el = document.getElementById(id);
    el.textContent = '● ' + msg;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  };

  const escapeHTML = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  const escapeAttr = (str) => String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  // 更新介面上的名字與頭像
  const updateUserUI = (displayStr) => {
    const initial = displayStr.charAt(0);
    document.getElementById('avatarInitial').textContent = initial;
    document.getElementById('avatarUsername').textContent = displayStr;
    document.getElementById('panelAvatar').textContent = initial;
    document.getElementById('panelName').textContent = displayStr;
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 自訂帳號密碼註冊與登入
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.switchAuthTab = (tab) => {
    const isL = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isL);
    document.getElementById('registerForm').classList.toggle('hidden', isL);
    document.getElementById('tabLogin').className = isL ? "flex-1 py-2 text-sm font-bold rounded-lg bg-surface shadow-sm text-text" : "flex-1 py-2 text-sm font-medium rounded-lg text-muted";
    document.getElementById('tabRegister').className = isL ? "flex-1 py-2 text-sm font-medium rounded-lg text-muted" : "flex-1 py-2 text-sm font-bold rounded-lg bg-surface shadow-sm text-text";
  };

  window.handleRegister = async () => {
    const acc = document.getElementById('regAccount').value.trim();
    let rawName = document.getElementById('regName').value.trim();
    const pass = document.getElementById('regPassword').value;

    if (!acc || !rawName || !pass) return window.showErr('registerError', '請填寫所有欄位');
    if (pass.length < 6) return window.showErr('registerError', '密碼至少需 6 碼');

    // 解決名字重複「老師」的問題 (如果老師自己打了老師，就不要再加)
    const fullName = rawName.endsWith('老師') ? rawName : rawName + ' 老師';
    const fakeEmail = acc + EMAIL_DOMAIN;

    try {
      // 1. 建立 Firebase 帳號
      const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
      // 2. 將名字寫入 Profile
      await updateProfile(userCredential.user, { displayName: fullName });
      
      // 3. 手動更新 UI (防止 onAuthStateChanged 搶拍)
      currentUser = { uid: userCredential.user.uid, username: fullName };
      updateUserUI(fullName);
      
      document.getElementById('navGuest').classList.add('hidden');
      document.getElementById('navUser').classList.remove('hidden');
      document.getElementById('navUser').classList.add('flex');
      
      window.showToast('帳號建立成功，歡迎加入！');
      window.showSection('gallery');
    } catch (error) {
      if (error.code === 'auth/email-already-in-use') {
        window.showErr('registerError', '此帳號已被註冊過了');
      } else {
        window.showErr('registerError', '註冊失敗：' + error.message);
      }
    }
  };

  window.handleLogin = async () => {
    const acc = document.getElementById('loginAccount').value.trim();
    const pass = document.getElementById('loginPassword').value;

    if (!acc || !pass) return window.showErr('loginError', '請輸入帳號與密碼');

    const fakeEmail = acc + EMAIL_DOMAIN;

    try {
      await signInWithEmailAndPassword(auth, fakeEmail, pass);
      window.showToast('登入成功！');
      window.showSection('gallery');
    } catch (error) {
      window.showErr('loginError', '登入失敗：帳號或密碼錯誤');
    }
  };

  window.handleLogout = async () => {
    await signOut(auth);
    window.closeProfilePanel();
    window.showToast('已登出');
    window.showSection('gallery');
  };

  // 監聽登入狀態改變
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // 為了確保抓到最新寫入的 displayName，強制重新載入一次 User 資訊
      await user.reload(); 
      const fetchedUser = auth.currentUser;
      
      const displayStr = fetchedUser.displayName || currentUser?.username || '老師';
      currentUser = { uid: fetchedUser.uid, username: displayStr };
      
      document.getElementById('navGuest').classList.add('hidden');
      document.getElementById('navUser').classList.remove('hidden');
      document.getElementById('navUser').classList.add('flex');
      
      updateUserUI(displayStr);
      
      // 若側邊欄開啟著，重新渲染
      if(!document.getElementById('profileOverlay').classList.contains('hidden')){
         window.renderProfileWorks();
      }
    } else {
      currentUser = null;
      document.getElementById('navGuest').classList.remove('hidden');
      document.getElementById('navUser').classList.add('hidden');
      document.getElementById('navUser').classList.remove('flex');
    }
  });

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 資料庫讀取 (取得所有作品)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.fetchWorks = async () => {
    try {
      const q = query(collection(db, "works"), orderBy("updatedAt", "desc"));
      const querySnapshot = await getDocs(q);
      allWorks = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    } catch (e) {
      console.error("讀取資料失敗 (可能尚未更換 Firebase Config)", e);
    }
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 大廳渲染
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const gradeTags = {
    '一年級': 'tag-g1', '二年級': 'tag-g2', '三年級': 'tag-g3',
    '四年級': 'tag-g4', '五年級': 'tag-g5', '六年級': 'tag-g6',
  };

  window.filterGallery = async (grade, btn) => {
    document.querySelectorAll('#headerFilters button').forEach(el => el.className = "px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200");
    btn.className = "px-4 py-1.5 rounded-full text-sm font-semibold bg-text text-white";
    currentFilter = grade;
    window.renderGallery(grade);
  };

  window.renderGallery = async (grade = '全部') => {
    currentFilter = grade;
    await window.fetchWorks(); 
    
    const filtered = grade === '全部' ? allWorks : allWorks.filter(w => w.grade === grade);

    document.getElementById('artworkGrid').innerHTML = filtered.map(w => `
      <div class="artwork-card bg-surface rounded-2xl border border-border overflow-hidden cursor-pointer" onclick="openPreviewModal('${w.id}')">
        <div class="h-40 relative bg-gray-50 border-b border-border overflow-hidden group">
          <iframe sandbox="allow-scripts" srcdoc="${escapeAttr(w.htmlCode)}" class="absolute inset-0 w-[200%] h-[200%] origin-top-left scale-50 pointer-events-none opacity-80 group-hover:opacity-100"></iframe>
          <span class="absolute top-3 left-3 px-3 py-1 rounded-full text-xs font-bold ${gradeTags[w.grade]}">${w.grade}</span>
        </div>
        <div class="p-5">
          <h3 class="font-bold text-text text-base mb-1 truncate">${escapeHTML(w.title)}</h3>
          <p class="text-sm font-medium text-muted">${escapeHTML(w.username)}</p>
        </div>
      </div>
    `).join('');
    document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 新增與編輯作品
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.selectGrade = (btn, grade) => {
    document.querySelectorAll('.grade-btn').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('selectedGrade').value = grade;
  };

  window.updateLivePreview = () => {
    document.getElementById('livePreviewIframe').srcdoc = document.getElementById('htmlCode').value;
  };

  window.handleUpload = async () => {
    if (!currentUser) return window.showSection('auth');
    
    const title = document.getElementById('artworkTitle').value.trim();
    const url = document.getElementById('artworkUrl').value.trim();
    const grade = document.getElementById('selectedGrade').value;
    const htmlCode = document.getElementById('htmlCode').value.trim();
    const editId = document.getElementById('editingWorkId').value;

    if (!title || !url || !grade || !htmlCode) return alert('請填寫所有欄位 (包含跳轉連結)');

    const newWorkData = {
      title, 
      url: formatLink(url), 
      grade, 
      htmlCode,
      userId: currentUser.uid, 
      username: currentUser.username,
      updatedAt: Date.now()
    };

    try {
      document.getElementById('uploadBtn').disabled = true;
      document.getElementById('uploadBtn').textContent = '處理中...';

      if (editId) {
        // 更新模式
        const workRef = doc(db, "works", editId);
        const oldWork = allWorks.find(w => w.id === editId);
        
        let newHistory = oldWork.history || [];
        if (oldWork.htmlCode !== htmlCode || oldWork.url !== newWorkData.url) {
          newHistory.unshift({ code: oldWork.htmlCode, url: oldWork.url, timestamp: oldWork.updatedAt });
        }
        newWorkData.history = newHistory;
        
        await updateDoc(workRef, newWorkData);
        window.showToast('作品已更新');
      } else {
        // 新增模式
        newWorkData.createdAt = Date.now();
        newWorkData.history = [];
        await addDoc(collection(db, "works"), newWorkData);
        window.showToast('作品發佈成功');
      }
      
      window.resetUploadForm();
      window.showSection('gallery');
    } catch (e) {
      console.error(e);
      alert('發佈失敗，請確定您的 Firebase 規則已經設定');
    } finally {
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('uploadBtn').textContent = '儲存並發佈';
    }
  };

  window.editWork = (workId) => {
    const work = allWorks.find(w => w.id === workId);
    if (!work || work.userId !== currentUser?.uid) return;
    
    document.getElementById('artworkTitle').value = work.title;
    document.getElementById('artworkUrl').value = work.url || '';
    document.getElementById('htmlCode').value = work.htmlCode;
    document.getElementById('editingWorkId').value = workId;
    document.getElementById('uploadPageTitle').textContent = '編輯作品';
    
    document.querySelectorAll('.grade-btn').forEach(b => {
      b.classList.remove('active');
      if (b.textContent === work.grade) { 
        b.classList.add('active'); 
        document.getElementById('selectedGrade').value = work.grade; 
      }
    });
    
    window.updateLivePreview();
    window.closeProfilePanel();
    window.showSection('upload');
  };

  window.resetUploadForm = () => {
    document.getElementById('artworkTitle').value = '';
    document.getElementById('artworkUrl').value = '';
    document.getElementById('htmlCode').value = '<!DOCTYPE html>\n<html>\n<body>\n  <h1>輸入代碼</h1>\n</body>\n</html>';
    document.getElementById('selectedGrade').value = '';
    document.getElementById('editingWorkId').value = '';
    document.getElementById('uploadPageTitle').textContent = '發佈新網頁';
    document.querySelectorAll('.grade-btn').forEach(el => el.classList.remove('active'));
    window.updateLivePreview();
  };

  window.deleteWork = async (workId) => {
    if (!confirm('確定永久刪除此作品？無法復原喔！')) return;
    
    try {
      await deleteDoc(doc(db, "works", workId));
      window.showToast('作品已永久刪除');
      // 重新讀取資料並刷新畫面
      await window.fetchWorks();
      window.renderProfileWorks();
      window.renderGallery(currentFilter);
    } catch(e) {
      console.error(e);
      alert('刪除失敗');
    }
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 個人面板與歷史紀錄
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.openProfilePanel = () => {
    if (!currentUser) return;
    window.renderProfileWorks();
    document.getElementById('profileOverlay').classList.remove('hidden');
    document.getElementById('profilePanel').style.transform = 'translateX(0)';
    document.body.style.overflow = 'hidden';
  };

  window.closeProfilePanel = () => {
    document.getElementById('profileOverlay').classList.add('hidden');
    document.getElementById('profilePanel').style.transform = 'translateX(100%)';
    document.body.style.overflow = '';
  };

  window.renderProfileWorks = () => {
    const works = allWorks.filter(w => w.userId === currentUser.uid);
    const list = document.getElementById('profileWorksList');
    if (works.length === 0) { list.innerHTML = '<p class="text-center text-muted mt-10">尚無發佈紀錄</p>'; return; }

    list.innerHTML = works.map(w => {
      const safeUrl = formatLink(w.url);
      return `
      <div class="border border-border rounded-xl p-4 shadow-sm relative">
        <div class="flex justify-between items-start mb-2">
          <h4 class="font-bold text-pine text-sm">${escapeHTML(w.title)}</h4>
          <span class="text-[10px] text-muted">${new Date(w.updatedAt).toLocaleDateString()}</span>
        </div>
        <a href="${escapeAttr(safeUrl)}" target="_blank" class="text-xs text-blue-600 hover:text-blue-800 mb-3 block truncate underline">
          🔗 ${escapeHTML(safeUrl)}
        </a>
        <div class="flex gap-2">
          <button onclick="editWork('${w.id}')" class="flex-1 py-1.5 bg-page text-text text-xs font-bold rounded border border-border hover:bg-gray-200">編輯</button>
          <button onclick="viewHistory('${w.id}')" class="flex-1 py-1.5 bg-pine text-white text-xs font-bold rounded hover:bg-mint">歷史紀錄</button>
          <button onclick="deleteWork('${w.id}')" class="px-3 py-1.5 bg-red-50 text-peach text-xs font-bold rounded hover:bg-red-100">刪除</button>
        </div>
      </div>
    `}).join('');
  };

  window.viewHistory = (workId) => {
    const work = allWorks.find(w => w.id === workId);
    if (!work) return;
    
    document.getElementById('historyModalTitle').textContent = `[${work.title}] 版本紀錄`;
    
    const allVersions = [
      { title: '最新版本 (目前)', code: work.htmlCode, time: work.updatedAt }, 
      ...(work.history || []).map((h, i) => ({
        title: `備份版本 #${(work.history.length || 0) - i}`, code: h.code, time: h.timestamp
      }))
    ];

    const listDiv = document.getElementById('historyVersionList');
    listDiv.innerHTML = allVersions.map((v, i) => `
      <div class="p-3 border border-border rounded bg-white cursor-pointer hover:border-pine transition-colors ${i===0?'border-pine border-2':''}" 
           onclick="showHistoryCode(${i}, this)">
        <p class="text-sm font-bold text-text">${v.title}</p>
        <p class="text-[11px] text-muted">${new Date(v.time).toLocaleString('zh-TW')}</p>
      </div>
    `).join('');

    window.currentHistoryData = allVersions;
    window.showHistoryCode(0, listDiv.firstElementChild);
    document.getElementById('historyModal').classList.remove('hidden');
  };

  window.showHistoryCode = (index, element) => {
    const siblings = document.getElementById('historyVersionList').children;
    for(let el of siblings) { el.classList.remove('border-pine', 'border-2'); }
    element.classList.add('border-pine', 'border-2');
    
    const codeStr = window.currentHistoryData[index].code;
    document.getElementById('historyCodeViewer').value = codeStr;

    document.getElementById('copyHistoryBtn').onclick = () => {
      navigator.clipboard.writeText(codeStr);
      window.showToast('代碼已複製');
    };
  };

  window.closeHistoryModal = () => { document.getElementById('historyModal').classList.add('hidden'); };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 彈窗預覽與跳轉
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.openPreviewModal = (workId) => {
    const work = allWorks.find(w => w.id === workId);
    if (!work) return;
    
    currentPreviewUrl = formatLink(work.url); 
    
    document.getElementById('modalTitle').textContent = work.title;
    document.getElementById('modalAuthor').textContent = `由 ${work.username} 發佈`;
    document.getElementById('modalIframe').srcdoc = work.htmlCode;
    
    document.getElementById('previewModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };

  window.closePreview = () => {
    document.getElementById('previewModal').classList.add('hidden');
    document.getElementById('modalIframe').srcdoc = '';
    document.body.style.overflow = '';
  };

  window.openStandaloneWork = () => {
    if (currentPreviewUrl && currentPreviewUrl !== '#') {
      window.open(currentPreviewUrl, '_blank');
    } else {
      alert("此作品未提供有效的跳轉連結");
    }
  };

  // 初始化啟動
  window.fetchWorks().then(() => {
    window.renderGallery('全部');
    window.showSection('gallery');
  });

</script>
</body>
</html>
