<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秀明小學 數學科 數字教育資源庫</title>
  
  <!-- 網站小圖示 (Favicon) 改為讀取外部檔案 -->
  <link rel="icon" type="image/jpeg" href="./logo.JPG" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page:    '#F5F5F7',
            surface: '#FFFFFF',
            text:    '#1D1D1F',
            muted:   '#86868B',
            border:  '#D2D2D7',
            pine:    '#1A2352',
            mint:    '#2C3A73',
            peach:   '#C42127',
            gold:    '#DDB52A',
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          boxShadow: {
            'apple': '0 4px 24px rgba(0, 0, 0, 0.04)',
            'float': '0 20px 40px rgba(26, 35, 82, 0.15)',
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background-color: #F5F5F7; color: #1D1D1F; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;}
    
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #D2D2D7; border-radius: 10px; }
    
    input:focus, textarea:focus, select:focus { outline: 2px solid #1A2352; outline-offset: -1px; }

    .page-section { display: none; flex: 1; }
    .page-section.active { display: block; animation: fadeIn 0.4s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .artwork-card { transition: all 0.3s ease; }
    .artwork-card:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(0,0,0,0.06); }

    .tag-g1 { background: #E0F2FE; color: #0284C7; } 
    .tag-g2 { background: #FCE7F3; color: #DB2777; } 
    .tag-g3 { background: #FEF3C7; color: #D97706; } 
    .tag-g4 { background: #DCFCE7; color: #16A34A; } 
    .tag-g5 { background: #F3E8FF; color: #9333EA; } 
    .tag-g6 { background: #FFEDD5; color: #EA580C; } 
    
    .grade-btn, .cat-btn { transition: all 0.2s ease; border: 2px solid transparent; }
    .grade-btn.active { border-color: #1A2352; transform: scale(1.05); font-weight: bold; }
    
    /* 範疇按鈕特殊樣式 */
    .cat-btn.active { border-color: #C42127; color: #C42127; transform: scale(1.05); font-weight: bold; background-color: #FEF2F2; }

    #htmlCode, .code-viewer { font-family: 'Courier New', Courier, monospace; font-size: 13px; line-height: 1.6; background-color: #1E1E1E; color: #D4D4D4; resize: none; }
    
    #profilePanel { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.hide { opacity: 0; transform: translateY(20px); pointer-events: none; }
  </style>
</head>

<body>

<!-- ① 頂部導覽列 -->
<header class="sticky top-0 z-40 glass border-b border-border">
  <div class="max-w-7xl mx-auto px-3 sm:px-6 h-16 flex items-center justify-between gap-2 sm:gap-4">
    <button onclick="showSection('gallery')" class="flex items-center gap-2 sm:gap-3 group shrink-0 min-w-0">
      <!-- 學校 Logo：改為讀取外部檔案 ./logo.JPG -->
      <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-white flex items-center justify-center relative border border-pine/20 shadow-sm flex-shrink-0">
        <img src="./logo.JPG" alt="秀明小學" class="w-full h-full object-contain object-center p-1" onerror="this.src='https://via.placeholder.com/150?text=Logo'" />
      </div>
      <div class="leading-tight text-left min-w-0 flex-1">
        <span class="font-bold text-[13px] sm:text-[17px] text-text block truncate">秀明小學 數學科 數字教育資源庫</span>
        <span class="text-peach text-[8px] sm:text-[10px] font-bold uppercase tracking-wider block truncate">SMPS Maths Digital Education Gallery</span>
      </div>
    </button>

    <div id="headerFilters" class="hidden md:flex items-center gap-2">
      <button onclick="filterGallery('全部',this)" class="px-4 py-1.5 rounded-full text-sm font-semibold bg-text text-white">全部作品</button>
      <button onclick="filterGallery('一年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">一年級</button>
      <button onclick="filterGallery('二年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">二年級</button>
      <button onclick="filterGallery('三年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">三年級</button>
      <button onclick="filterGallery('四年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">四年級</button>
      <button onclick="filterGallery('五年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">五年級</button>
      <button onclick="filterGallery('六年級',this)" class="px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200">六年級</button>
    </div>

    <div class="flex items-center gap-2 sm:gap-3 shrink-0">
      <!-- 訪客狀態 -->
      <div id="navGuest" class="flex items-center gap-2 sm:gap-3">
        <button onclick="showSection('auth'); switchAuthTab('login');" class="text-xs sm:text-sm font-medium text-text hover:text-pine shrink-0">登入</button>
        <button onclick="showSection('auth'); switchAuthTab('register');" class="text-xs sm:text-sm px-3 sm:px-5 py-1.5 sm:py-2 rounded-full bg-pine text-white hover:bg-mint font-medium shadow-sm shrink-0">註冊</button>
      </div>
      <!-- 登入狀態 -->
      <div id="navUser" class="hidden items-center gap-2 sm:gap-4">
        <button onclick="showSection('upload')" class="text-xs sm:text-sm px-3 sm:px-4 py-1.5 sm:py-2 rounded-full bg-pine text-white hover:bg-mint font-medium flex items-center gap-1 sm:gap-1.5 shadow-sm shrink-0">
          <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span class="hidden sm:inline">發佈</span>
        </button>
        <button onclick="openProfilePanel()" class="flex items-center gap-1.5 sm:gap-2 sm:pl-3 sm:border-l border-border hover:opacity-80 transition-opacity shrink-0">
          <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-peach text-white flex items-center justify-center font-bold text-xs sm:text-sm shadow-sm" id="avatarInitial">T</div>
          <span class="text-xs sm:text-sm font-semibold text-text hidden md:block" id="avatarUsername">姓名</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="w-full max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-10 flex-1 flex flex-col">

  <!-- 【登入系統 (自訂帳號與密碼)】 -->
  <section id="section-auth" class="page-section">
    <div class="max-w-sm mx-auto mt-6 sm:mt-10 w-full">
      <div class="text-center mb-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-text mb-2">教師平台登入</h1>
        <p class="text-xs sm:text-sm text-muted">請登入或註冊您的專屬教學帳號</p>
      </div>
      
      <div class="bg-surface rounded-2xl shadow-apple p-6 sm:p-8 border border-border/50">
        <!-- 切換 Tab -->
        <div class="flex bg-page rounded-xl p-1 mb-6 sm:mb-8">
          <button id="tabLogin" onclick="switchAuthTab('login')" class="flex-1 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-lg bg-surface shadow-sm text-text">登入</button>
          <button id="tabRegister" onclick="switchAuthTab('register')" class="flex-1 py-1.5 sm:py-2 text-xs sm:text-sm font-medium rounded-lg text-muted">註冊</button>
        </div>

        <!-- 登入表單 -->
        <div id="loginForm" class="space-y-4 sm:space-y-5">
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">登入帳號 <span class="text-pine">(@saumingps.edu.hk前的代號)</span></label>
            <input type="text" id="loginAccount" placeholder="例如：abcd" class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">密碼</label>
            <input type="password" id="loginPassword" placeholder="••••••••" class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div id="loginError" class="hidden text-peach text-xs sm:text-sm font-bold mt-2"></div>
          <button onclick="handleLogin()" class="w-full py-3 sm:py-3.5 bg-pine text-white rounded-xl text-sm font-bold hover:bg-mint shadow-sm mt-4">
            登入系統
          </button>
        </div>

        <!-- 註冊表單 -->
        <div id="registerForm" class="hidden space-y-4 sm:space-y-5">
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">註冊帳號 <span class="text-pine">(@saumingps.edu.hk前的代號)</span></label>
            <input type="text" id="regAccount" placeholder="例如：abcd" class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">您的姓名 (系統將自動加「老師」)</label>
            <div class="relative flex items-center">
              <input type="text" id="regName" placeholder="例如：陳大文" class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-border bg-page text-sm focus:bg-white pr-16"/>
              <span class="absolute right-4 text-sm font-bold text-pine pointer-events-none">老師</span>
            </div>
          </div>
          <div>
            <label class="text-xs font-bold text-muted mb-1.5 block">設定密碼 (至少6位數)</label>
            <input type="password" id="regPassword" placeholder="••••••••" class="w-full px-4 py-2.5 sm:py-3 rounded-xl border border-border bg-page text-sm focus:bg-white"/>
          </div>
          <div id="registerError" class="hidden text-peach text-xs sm:text-sm font-bold mt-2"></div>
          <button onclick="handleRegister()" class="w-full py-3 sm:py-3.5 bg-pine text-white rounded-xl text-sm font-bold hover:bg-mint shadow-sm mt-4">
            建立帳號
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- 【發佈與編輯】 -->
  <section id="section-upload" class="page-section">
    <div class="w-full mx-auto">
      <div class="flex items-center gap-2 mb-4 sm:mb-6 flex-wrap">
        <button onclick="showSection('gallery')" class="w-8 h-8 rounded-full hover:bg-gray-200 flex items-center justify-center text-muted shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
        <h2 class="text-xl sm:text-2xl font-bold text-text" id="uploadPageTitle">發佈新網頁</h2>
        <!-- 溫馨提示 -->
        <span class="inline-block text-xs sm:text-sm text-peach font-bold sm:ml-3 bg-red-50 px-3 sm:px-4 py-1.5 rounded-full animate-pulse border border-red-100 shadow-sm mt-2 sm:mt-0">
          💡 溫馨提示：填寫完畢後，請滑至最下方點擊「儲存並發佈」
        </span>
      </div>

      <div class="bg-surface rounded-2xl shadow-apple border border-border/50 overflow-hidden">
        <div class="p-4 sm:p-6 border-b border-border bg-gray-50 grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
          <div class="space-y-4 sm:space-y-5">
            <div>
              <label class="text-sm font-bold text-text mb-2 block">1. 作品名稱</label>
              <input type="text" id="artworkTitle" placeholder="例如：互動幾何計算器" class="w-full px-4 py-2 sm:py-2.5 rounded-xl border border-border bg-white text-sm sm:text-base shadow-sm"/>
            </div>
            <div>
              <label class="text-sm font-bold text-text mb-2 block">2. 跳轉連結 (必填)</label>
              <input type="url" id="artworkUrl" placeholder="https://example.com" class="w-full px-4 py-2 sm:py-2.5 rounded-xl border border-border bg-white text-sm sm:text-base shadow-sm"/>
              <p class="text-xs text-muted mt-1">使用者點擊時，將強制於新分頁導向此網址。</p>
            </div>
          </div>
          <div class="space-y-4 sm:space-y-5">
            <div>
              <label class="text-sm font-bold text-text mb-2 block">3. 適用年級</label>
              <div class="flex flex-wrap gap-2">
                <button onclick="selectGrade(this,'一年級')" class="grade-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">一年級</button>
                <button onclick="selectGrade(this,'二年級')" class="grade-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">二年級</button>
                <button onclick="selectGrade(this,'三年級')" class="grade-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">三年級</button>
                <button onclick="selectGrade(this,'四年級')" class="grade-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">四年級</button>
                <button onclick="selectGrade(this,'五年級')" class="grade-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">五年級</button>
                <button onclick="selectGrade(this,'六年級')" class="grade-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">六年級</button>
              </div>
              <input type="hidden" id="selectedGrade" />
              <input type="hidden" id="editingWorkId" />
            </div>
            <div>
              <label class="text-sm font-bold text-text mb-2 block">4. 所屬範疇</label>
              <div class="flex flex-wrap gap-2">
                <button onclick="selectCategory(this,'數範疇(N)')" class="cat-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">數範疇(N)</button>
                <button onclick="selectCategory(this,'度量範疇(M)')" class="cat-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">度量範疇(M)</button>
                <button onclick="selectCategory(this,'圖形與空間範疇(S)')" class="cat-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">圖形與空間範疇(S)</button>
                <button onclick="selectCategory(this,'數據處理範疇(D)')" class="cat-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">數據處理範疇(D)</button>
                <button onclick="selectCategory(this,'代數範疇(A)')" class="cat-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl text-xs sm:text-sm bg-white border-border text-muted shadow-sm">代數範疇(A)</button>
              </div>
              <input type="hidden" id="selectedCategory" />
            </div>
          </div>
        </div>

        <div class="flex flex-col lg:flex-row h-auto lg:h-[600px]">
          <!-- 編輯區 -->
          <div class="flex-1 flex flex-col border-b lg:border-b-0 lg:border-r border-border min-h-[300px]">
            <div class="px-4 py-2 bg-pine text-white text-xs font-bold flex justify-between items-center tracking-wider">
              <span><span class="text-peach">●</span> <span class="text-gold">●</span> <span class="text-green-400">●</span> HTML 代碼編輯區</span>
              <!-- 上傳 HTML 按鈕 -->
              <div>
                <input type="file" id="htmlFileInput" accept=".html,.htm" class="hidden" onchange="handleFileUpload(event)">
                <button onclick="document.getElementById('htmlFileInput').click()" class="bg-white/20 hover:bg-white/30 text-white px-2 py-1 rounded transition-colors flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                  上傳 HTML 檔
                </button>
              </div>
            </div>
            <textarea id="htmlCode" oninput="updateLivePreview()" class="flex-1 w-full p-3 sm:p-5 focus:outline-none min-h-[250px] lg:min-h-0" placeholder="<!DOCTYPE html><html><body><h1>輸入代碼</h1></body></html>"></textarea>
          </div>
          <!-- 預覽區 -->
          <div class="flex-1 flex flex-col bg-white min-h-[300px]">
            <div class="px-4 py-2 bg-gray-100 border-b border-border text-xs font-bold text-muted flex items-center gap-2">
              <svg class="w-4 h-4 text-pine" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>即時預覽
            </div>
            <div class="flex-1 overflow-hidden relative">
              <iframe id="livePreviewIframe" sandbox="allow-scripts" class="absolute inset-0 w-full h-full border-none bg-white"></iframe>
            </div>
          </div>
        </div>

        <div class="p-4 border-t border-border bg-gray-50 flex items-center justify-end">
          <button onclick="handleUpload()" id="uploadBtn" class="px-6 sm:px-8 py-2.5 sm:py-3 bg-pine text-white rounded-xl font-bold text-sm hover:bg-mint shadow-sm w-full sm:w-auto">
            儲存並發佈
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- 【作品大廳】 -->
  <section id="section-gallery" class="page-section active flex-1">
    <!-- Hero Banner -->
    <div class="relative bg-pine rounded-2xl sm:rounded-[2rem] overflow-hidden mb-6 sm:mb-8 px-6 sm:px-8 py-10 sm:py-14 shadow-float">
      <div class="absolute top-0 right-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute -right-20 -top-20 w-64 h-64 sm:w-96 sm:h-96 bg-peach rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
        <div class="absolute right-20 sm:right-40 -bottom-20 w-48 h-48 sm:w-80 sm:h-80 bg-gold rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
      </div>
      <div class="relative z-10 max-w-3xl">
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-white/10 rounded-full text-gold text-[10px] sm:text-xs font-bold tracking-widest uppercase mb-4 sm:mb-5 backdrop-blur-md border border-white/20">
          <span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-peach"></span>Digital Education Gallery
        </div>
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-3 sm:mb-5 leading-tight">數字教育資源庫</h1>
        <p class="text-white/80 text-sm sm:text-lg leading-relaxed font-medium max-w-xl">
          匯聚秀明小學老師們的心血結晶。<br/>點擊卡片即可預覽網頁，或開啟獨立分頁進行教學。
        </p>
      </div>
    </div>

    <!-- 控制列：範疇篩選與排序 -->
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6 bg-surface p-3 sm:p-4 rounded-xl sm:rounded-2xl shadow-sm border border-border/50">
      <!-- 範疇篩選 -->
      <div class="flex flex-wrap gap-2 w-full lg:w-auto" id="categoryFilters">
        <button onclick="filterCategory('全部', this)" class="cat-filter-btn active px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-bold bg-pine text-white transition-all shadow-sm">所有範疇</button>
        <button onclick="filterCategory('數範疇(N)', this)" class="cat-filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-medium bg-white border border-border text-muted hover:border-pine hover:text-pine transition-all shadow-sm">數範疇(N)</button>
        <button onclick="filterCategory('度量範疇(M)', this)" class="cat-filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-medium bg-white border border-border text-muted hover:border-pine hover:text-pine transition-all shadow-sm">度量範疇(M)</button>
        <button onclick="filterCategory('圖形與空間範疇(S)', this)" class="cat-filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-medium bg-white border border-border text-muted hover:border-pine hover:text-pine transition-all shadow-sm">圖形與空間(S)</button>
        <button onclick="filterCategory('數據處理範疇(D)', this)" class="cat-filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-medium bg-white border border-border text-muted hover:border-pine hover:text-pine transition-all shadow-sm">數據處理(D)</button>
        <button onclick="filterCategory('代數範疇(A)', this)" class="cat-filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-medium bg-white border border-border text-muted hover:border-pine hover:text-pine transition-all shadow-sm">代數範疇(A)</button>

        <div class="flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>
          <span class="text-xs sm:text-sm">排列：</span>

        <select id="sortSelect" onchange="changeSort(this.value)" class="bg-white border border-border rounded-lg px-2 sm:px-3 py-1 sm:py-1.5 text-xs sm:text-sm font-medium text-text shadow-sm focus:ring-0 cursor-pointer flex-1 sm:flex-none">

    <!-- 網格區 -->

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Firebase SDK 引入與系統邏輯
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAoof3IOjEKOJrN-FlH70D3qin0CF1vO5E",
    authDomain: "smpsmaths-aa040.firebaseapp.com",
    projectId: "smpsmaths-aa040",
    storageBucket: "smpsmaths-aa040.firebasestorage.app",
    messagingSenderId: "870771862504",
    appId: "1:870771862504:web:ab5ca008d6a5b881f0525d",
    measurementId: "G-8SXJLPE0YM"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const EMAIL_DOMAIN = '@saumingps.edu.hk';
  let currentUser = null; 
  let allWorks = []; 
  let currentGradeFilter = '全部';     
  let currentCategoryFilter = '全部';  
  let currentSort = 'time';           
  let currentPreviewUrl = '';

  const formatLink = (url) => {
    if(!url) return '#';
    if (!url.startsWith('http://') && !url.startsWith('https://')) return 'https://' + url;
    return url;
  };

  window.showSection = (id) => {
    document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
    document.getElementById('section-' + id).classList.add('active');
    document.getElementById('headerFilters').style.display = (id === 'gallery') ? 'flex' : 'none';
    if (id === 'upload' && !document.getElementById('editingWorkId').value) window.resetUploadForm();
    if (id === 'gallery') window.renderGallery(currentGradeFilter, true); 
    window.scrollTo(0,0);
  };

  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.remove('hide'); t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); t.classList.add('hide'); }, 2500);
  };

  window.showErr = (id, msg) => {
    const el = document.getElementById(id);
    el.textContent = '● ' + msg;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  };

  const escapeHTML = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  const escapeAttr = (str) => String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  const updateUserUI = (displayStr) => {
    const initial = displayStr.charAt(0);
    document.getElementById('avatarInitial').textContent = initial;
    document.getElementById('avatarUsername').textContent = displayStr;
    document.getElementById('panelAvatar').textContent = initial;
    document.getElementById('panelName').textContent = displayStr;
  };

  window.switchAuthTab = (tab) => {
    const isL = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isL);
    document.getElementById('registerForm').classList.toggle('hidden', isL);
    document.getElementById('tabLogin').className = isL ? "flex-1 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-lg bg-surface shadow-sm text-text" : "flex-1 py-1.5 sm:py-2 text-xs sm:text-sm font-medium rounded-lg text-muted";
    document.getElementById('tabRegister').className = isL ? "flex-1 py-1.5 sm:py-2 text-xs sm:text-sm font-medium rounded-lg text-muted" : "flex-1 py-1.5 sm:py-2 text-xs sm:text-sm font-bold rounded-lg bg-surface shadow-sm text-text";
  };

  window.handleRegister = async () => {
    const acc = document.getElementById('regAccount').value.trim();
    let rawName = document.getElementById('regName').value.trim();
    const pass = document.getElementById('regPassword').value;

    if (!acc || !rawName || !pass) return window.showErr('registerError', '請填寫所有欄位');
    if (pass.length < 6) return window.showErr('registerError', '密碼至少需 6 碼');

    const fullName = rawName.endsWith('老師') ? rawName : rawName + ' 老師';
    const fakeEmail = acc + EMAIL_DOMAIN;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
      await updateProfile(userCredential.user, { displayName: fullName });
      
      currentUser = { uid: userCredential.user.uid, username: fullName };
      updateUserUI(fullName);
      
      document.getElementById('navGuest').classList.add('hidden');
      document.getElementById('navUser').classList.remove('hidden');
      document.getElementById('navUser').classList.add('flex');
      
      window.showToast('帳號建立成功，歡迎加入！');
      window.showSection('gallery');
    } catch (error) {
      if (error.code === 'auth/email-already-in-use') {
        window.showErr('registerError', '此帳號已被註冊過了');
      } else {
        window.showErr('registerError', '註冊失敗：' + error.message);
      }
    }
  };

  window.handleLogin = async () => {
    const acc = document.getElementById('loginAccount').value.trim();
    const pass = document.getElementById('loginPassword').value;

    if (!acc || !pass) return window.showErr('loginError', '請輸入帳號與密碼');

    const fakeEmail = acc + EMAIL_DOMAIN;

    try {
      await signInWithEmailAndPassword(auth, fakeEmail, pass);
      window.showToast('登入成功！');
      window.showSection('gallery');
    } catch (error) {
      window.showErr('loginError', '登入失敗：帳號或密碼錯誤');
    }
  };

  window.handleLogout = async () => {
    await signOut(auth);
    window.closeProfilePanel();
    window.showToast('已登出');
    window.showSection('gallery');
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await user.reload(); 
      const fetchedUser = auth.currentUser;
      const displayStr = fetchedUser.displayName || currentUser?.username || '老師';
      currentUser = { uid: fetchedUser.uid, username: displayStr };
      
      document.getElementById('navGuest').classList.add('hidden');
      document.getElementById('navUser').classList.remove('hidden');
      document.getElementById('navUser').classList.add('flex');
      
      updateUserUI(displayStr);
      
      if(!document.getElementById('profileOverlay').classList.contains('hidden')){
         window.renderProfileWorks();
      }
    } else {
      currentUser = null;
      document.getElementById('navGuest').classList.remove('hidden');
      document.getElementById('navUser').classList.add('hidden');
      document.getElementById('navUser').classList.remove('flex');
    }
  });

  window.fetchWorks = async () => {
    try {
      const q = query(collection(db, "works"), orderBy("updatedAt", "desc"));
      const querySnapshot = await getDocs(q);
      allWorks = querySnapshot.docs
        .map(doc => ({ id: doc.id, ...doc.data() }))
        .filter(work => work.isDeleted !== true);
    } catch (e) {
      console.error("讀取資料失敗 (請檢查 Firebase Config 或是 Firestore Rules)", e);
    }
  };

  const gradeTags = {
    '一年級': 'tag-g1', '二年級': 'tag-g2', '三年級': 'tag-g3',
    '四年級': 'tag-g4', '五年級': 'tag-g5', '六年級': 'tag-g6',
  };

  window.filterGallery = (grade, btn) => {
    document.querySelectorAll('#headerFilters button').forEach(el => el.className = "px-4 py-1.5 rounded-full text-sm font-medium text-muted hover:bg-gray-200");
    btn.className = "px-4 py-1.5 rounded-full text-sm font-semibold bg-text text-white";
    window.renderGallery(grade, false); 
  };

  window.filterCategory = (cat, btn) => {
    document.querySelectorAll('.cat-filter-btn').forEach(el => {
      el.className = "cat-filter-btn px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-medium bg-white border border-border text-muted hover:border-pine hover:text-pine transition-all shadow-sm";
    });
    btn.className = "cat-filter-btn active px-3 sm:px-4 py-1.5 sm:py-2 rounded-full text-xs font-bold bg-pine text-white transition-all shadow-sm";
    currentCategoryFilter = cat;
    window.renderGallery(currentGradeFilter, false);
  };

  window.changeSort = (sortType) => {
    currentSort = sortType;
    window.renderGallery(currentGradeFilter, false);
  };

  window.renderGallery = async (grade = currentGradeFilter, forceFetch = false) => {
    currentGradeFilter = grade;
    if (forceFetch || allWorks.length === 0) {
      await window.fetchWorks(); 
    }
    
    let filtered = grade === '全部' ? allWorks : allWorks.filter(w => w.grade === grade);
    if (currentCategoryFilter !== '全部') {
      filtered = filtered.filter(w => w.category === currentCategoryFilter);
    }

    if (currentSort === 'time') {
      filtered.sort((a, b) => b.updatedAt - a.updatedAt);
    } else if (currentSort === 'category') {
      filtered.sort((a, b) => {
        const catA = a.category || '';
        const catB = b.category || '';
        if (catA < catB) return -1;
        if (catA > catB) return 1;
        return b.updatedAt - a.updatedAt; 
      });
    }

    document.getElementById('artworkGrid').innerHTML = filtered.map(w => {
      const categoryTag = w.category ? `<span class="absolute top-3 right-3 px-2 sm:px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold bg-white/95 text-pine shadow-sm border border-black/5">${escapeHTML(w.category)}</span>` : '';
      return `
      <div class="artwork-card bg-surface rounded-2xl border border-border overflow-hidden cursor-pointer" onclick="openPreviewModal('${w.id}')">
        <div class="h-32 sm:h-40 relative bg-gray-50 border-b border-border overflow-hidden group">
          <iframe sandbox="allow-scripts" srcdoc="${escapeAttr(w.htmlCode)}" class="absolute inset-0 w-[200%] h-[200%] origin-top-left scale-50 pointer-events-none opacity-80 group-hover:opacity-100"></iframe>
          <span class="absolute top-3 left-3 px-2 sm:px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold ${gradeTags[w.grade] || 'bg-gray-100 text-gray-700'} shadow-sm border border-black/5">${w.grade}</span>
          ${categoryTag}
        </div>
        <div class="p-4 sm:p-5">
          <h3 class="font-bold text-text text-sm sm:text-base mb-1 truncate">${escapeHTML(w.title)}</h3>
          <p class="text-xs sm:text-sm font-medium text-muted">${escapeHTML(w.username)}</p>
        </div>
      </div>
    `}).join('');
    document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 新增與編輯作品 & HTML 上傳
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.selectGrade = (btn, grade) => {
    document.querySelectorAll('.grade-btn').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('selectedGrade').value = grade;
  };

  window.selectCategory = (btn, cat) => {
    document.querySelectorAll('.cat-btn').forEach(el => {
      el.classList.remove('active', 'border-peach', 'text-peach', 'bg-red-50');
      el.classList.add('border-border', 'text-muted', 'bg-white');
    });
    btn.classList.remove('border-border', 'text-muted', 'bg-white');
    btn.classList.add('active', 'border-peach', 'text-peach', 'bg-red-50');
    document.getElementById('selectedCategory').value = cat;
  };

  window.updateLivePreview = () => {
    document.getElementById('livePreviewIframe').srcdoc = document.getElementById('htmlCode').value;
  };

  // 處理上傳 HTML 檔案
  window.handleFileUpload = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('htmlCode').value = e.target.result;
      window.updateLivePreview();
      window.showToast('HTML 檔案已成功載入！');
    };
    reader.readAsText(file);
    event.target.value = '';
  };

  window.handleUpload = async () => {
    if (!currentUser) return window.showSection('auth');
    
    const title = document.getElementById('artworkTitle').value.trim();
    const url = document.getElementById('artworkUrl').value.trim();
    const grade = document.getElementById('selectedGrade').value;
    const category = document.getElementById('selectedCategory').value;
    const htmlCode = document.getElementById('htmlCode').value.trim();
    const editId = document.getElementById('editingWorkId').value;

    if (!title || !url || !grade || !category || !htmlCode) return alert('請填寫所有欄位 (包含跳轉連結與範疇選擇)');

    const newWorkData = {
      title, 
      url: formatLink(url), 
      grade, 
      category,
      htmlCode,
      userId: currentUser.uid, 
      username: currentUser.username,
      updatedAt: Date.now()
    };

    try {
      document.getElementById('uploadBtn').disabled = true;
      document.getElementById('uploadBtn').textContent = '處理中...';

      if (editId) {
        const workRef = doc(db, "works", editId);
        const oldWork = allWorks.find(w => w.id === editId);
        
        let newHistory = oldWork.history || [];
        if (oldWork.htmlCode !== htmlCode || oldWork.url !== newWorkData.url) {
          newHistory.unshift({ code: oldWork.htmlCode, url: oldWork.url, timestamp: oldWork.updatedAt });
        }
        newWorkData.history = newHistory;
        
        await updateDoc(workRef, newWorkData);
        window.showToast('作品已更新');
      } else {
        newWorkData.createdAt = Date.now();
        newWorkData.history = [];
        newWorkData.isDeleted = false;
        await addDoc(collection(db, "works"), newWorkData);
        window.showToast('作品發佈成功');
      }
      
      window.resetUploadForm();
      window.showSection('gallery'); 
    } catch (e) {
      console.error(e);
      alert('發佈失敗，請檢查網路狀態');
    } finally {
      document.getElementById('uploadBtn').disabled = false;
      document.getElementById('uploadBtn').textContent = '儲存並發佈';
    }
  };

  window.editWork = (workId) => {
    const work = allWorks.find(w => w.id === workId);
    if (!work || work.userId !== currentUser?.uid) return;
    
    document.getElementById('artworkTitle').value = work.title;
    document.getElementById('artworkUrl').value = work.url || '';
    document.getElementById('htmlCode').value = work.htmlCode;
    document.getElementById('editingWorkId').value = workId;
    document.getElementById('uploadPageTitle').textContent = '編輯作品';
    
    document.querySelectorAll('.grade-btn').forEach(b => {
      b.classList.remove('active');
      if (b.textContent === work.grade) { 
        b.classList.add('active'); 
        document.getElementById('selectedGrade').value = work.grade; 
      }
    });

    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.remove('active', 'border-peach', 'text-peach', 'bg-red-50');
      b.classList.add('border-border', 'text-muted', 'bg-white');
      if (b.textContent === work.category) { 
        b.classList.remove('border-border', 'text-muted', 'bg-white');
        b.classList.add('active', 'border-peach', 'text-peach', 'bg-red-50'); 
        document.getElementById('selectedCategory').value = work.category; 
      }
    });
    
    window.updateLivePreview();
    window.closeProfilePanel();
    window.showSection('upload');
  };

  window.resetUploadForm = () => {
    document.getElementById('artworkTitle').value = '';
    document.getElementById('artworkUrl').value = '';
    document.getElementById('htmlCode').value = '<!DOCTYPE html>\n<html>\n<body>\n  <h1>輸入代碼</h1>\n</body>\n</html>';
    document.getElementById('selectedGrade').value = '';
    document.getElementById('selectedCategory').value = '';
    document.getElementById('editingWorkId').value = '';
    document.getElementById('uploadPageTitle').textContent = '發佈新網頁';
    document.querySelectorAll('.grade-btn').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.cat-btn').forEach(el => {
      el.classList.remove('active', 'border-peach', 'text-peach', 'bg-red-50');
      el.classList.add('border-border', 'text-muted', 'bg-white');
    });
    window.updateLivePreview();
  };

  window.deleteWork = async (workId) => {
    if (!confirm('確定刪除此作品？')) return;
    try {
      await updateDoc(doc(db, "works", workId), { isDeleted: true, deletedAt: Date.now() });
      window.showToast('作品已刪除');
      await window.fetchWorks();
      window.renderProfileWorks();
      window.renderGallery(currentGradeFilter, false);
    } catch(e) {
      console.error(e);
      alert('刪除失敗');
    }
  };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 個人面板與歷史紀錄
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.openProfilePanel = () => {
    if (!currentUser) return;
    window.renderProfileWorks();
    document.getElementById('profileOverlay').classList.remove('hidden');
    document.getElementById('profilePanel').style.transform = 'translateX(0)';
    document.body.style.overflow = 'hidden';
  };

  window.closeProfilePanel = () => {
    document.getElementById('profileOverlay').classList.add('hidden');
    document.getElementById('profilePanel').style.transform = 'translateX(100%)';
    document.body.style.overflow = '';
  };

  window.renderProfileWorks = () => {
    const works = allWorks.filter(w => w.userId === currentUser.uid);
    const list = document.getElementById('profileWorksList');
    if (works.length === 0) { list.innerHTML = '<p class="text-center text-muted mt-10 text-sm">尚無發佈紀錄</p>'; return; }

    list.innerHTML = works.map(w => {
      const safeUrl = formatLink(w.url);
      return `
      <div class="border border-border rounded-xl p-3 sm:p-4 shadow-sm relative">
        <div class="flex justify-between items-start mb-2">
          <h4 class="font-bold text-pine text-sm line-clamp-1">${escapeHTML(w.title)}</h4>
          <span class="text-[10px] text-muted shrink-0 ml-2">${new Date(w.updatedAt).toLocaleDateString()}</span>
        </div>
        <a href="${escapeAttr(safeUrl)}" target="_blank" class="text-[11px] sm:text-xs text-blue-600 hover:text-blue-800 mb-3 block truncate underline">
          🔗 ${escapeHTML(safeUrl)}
        </a>
        <div class="flex gap-2">
          <button onclick="editWork('${w.id}')" class="flex-1 py-1.5 bg-page text-text text-[10px] sm:text-xs font-bold rounded border border-border hover:bg-gray-200">編輯</button>
          <button onclick="viewHistory('${w.id}')" class="flex-1 py-1.5 bg-pine text-white text-[10px] sm:text-xs font-bold rounded hover:bg-mint">歷史紀錄</button>
          <button onclick="deleteWork('${w.id}')" class="px-2 sm:px-3 py-1.5 bg-red-50 text-peach text-[10px] sm:text-xs font-bold rounded hover:bg-red-100">刪除</button>
        </div>
      </div>
    `}).join('');
  };

  window.viewHistory = (workId) => {
    const work = allWorks.find(w => w.id === workId);
    if (!work) return;
    
    document.getElementById('historyModalTitle').textContent = `[${work.title}] 版本紀錄`;
    
    const allVersions = [
      { title: '最新版本 (目前)', code: work.htmlCode, time: work.updatedAt }, 
      ...(work.history || []).map((h, i) => ({
        title: `備份版本 #${(work.history.length || 0) - i}`, code: h.code, time: h.timestamp
      }))
    ];

    const listDiv = document.getElementById('historyVersionList');
    listDiv.innerHTML = allVersions.map((v, i) => `
      <div class="p-2 sm:p-3 border border-border rounded bg-white cursor-pointer hover:border-pine transition-colors ${i===0?'border-pine border-2':''}" 
           onclick="showHistoryCode(${i}, this)">
        <p class="text-xs sm:text-sm font-bold text-text">${v.title}</p>
        <p class="text-[10px] sm:text-[11px] text-muted">${new Date(v.time).toLocaleString('zh-TW')}</p>
      </div>
    `).join('');

    window.currentHistoryData = allVersions;
    window.showHistoryCode(0, listDiv.firstElementChild);
    document.getElementById('historyModal').classList.remove('hidden');
  };

  window.showHistoryCode = (index, element) => {
    const siblings = document.getElementById('historyVersionList').children;
    for(let el of siblings) { el.classList.remove('border-pine', 'border-2'); }
    element.classList.add('border-pine', 'border-2');
    
    const codeStr = window.currentHistoryData[index].code;
    document.getElementById('historyCodeViewer').value = codeStr;

    document.getElementById('copyHistoryBtn').onclick = () => {
      navigator.clipboard.writeText(codeStr);
      window.showToast('代碼已複製');
    };
  };

  window.closeHistoryModal = () => { document.getElementById('historyModal').classList.add('hidden'); };

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 彈窗預覽與跳轉
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  window.openPreviewModal = (workId) => {
    const work = allWorks.find(w => w.id === workId);
    if (!work) return;
    
    currentPreviewUrl = formatLink(work.url); 
    
    document.getElementById('modalTitle').textContent = work.title;
    document.getElementById('modalAuthor').textContent = `由 ${work.username} 發佈`;
    document.getElementById('modalIframe').srcdoc = work.htmlCode;
    
    document.getElementById('previewModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };

  window.closePreview = () => {
    document.getElementById('previewModal').classList.add('hidden');
    document.getElementById('modalIframe').srcdoc = '';
    document.body.style.overflow = '';
  };

  window.openStandaloneWork = () => {
    if (currentPreviewUrl && currentPreviewUrl !== '#') {
      window.open(currentPreviewUrl, '_blank');
    } else {
      alert("此作品未提供有效的跳轉連結");
    }
  };

  // 初始化啟動
  window.fetchWorks().then(() => {
    window.renderGallery('全部', false);
    window.showSection('gallery');
  });

</script>
</body>
</html>
